                    - /url: https://en.wikipedia.org/wiki/Landfrieden
                  - text: "! Rather than medieval-like fights of all against all, we would sort out disagreements via courts, pluralistic institutions, and so on."
                  - link "↩" [ref=e293] [cursor=pointer]:

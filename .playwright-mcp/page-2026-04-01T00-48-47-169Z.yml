              - listitem [ref=e278]:
                - paragraph [ref=e279]:
                  - text: Congress—even the Vice President!—didn’t know about the Manhattan Project. We probably shouldn’t repeat that here; I’d even suggest that key officials for The Project require Senate confirmation.

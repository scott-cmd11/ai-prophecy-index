            - paragraph [ref=e86]: “We must be curious to learn how such a set of objects—hundreds of power plants, thousands of bombs, tens of thousands of people massed in national establishments—can be traced back to a few people sitting at laboratory benches discussing the peculiar behavior of one type of atom.”
            - generic [ref=e87]: —Spencer R. Weart
          - paragraph [ref=e89]: Many plans for “AI governance” are put forth these days, from licensing frontier AI systems to safety standards to a public cloud with a few hundred million in compute for academics. These seem well-intentioned—but to me, it seems like they are making a category error.
          - paragraph [ref=e90]:
            - emphasis [ref=e91]: I find it an
            - strong [ref=e92]:
              - emphasis [ref=e93]: insane
            - emphasis [ref=e94]: proposition that the US government will let a random SF startup develop superintelligence
            - text: . Imagine if we had developed atomic bombs by letting Uber just improvise.
          - paragraph [ref=e95]:
            - text: Superintelligence—AI systems
            - emphasis [ref=e96]: much
            - text: smarter than humans—will have vast power, from developing novel weaponry to driving an explosion in economic growth. Superintelligence will be the locus of international competition; a lead of months potentially decisive in military conflict.
          - paragraph [ref=e97]: It is a delusion of those who have unconsciously internalized our brief respite from history that this will not summon more primordial forces. Like many scientists before us, the great minds of San Francisco hope that they can control the destiny of the demon they are birthing. Right now, they still can; for they are among the few with situational awareness, who understand what they are building. But in the next few years, the world will wake up. So too will the national security state. History will make a triumphant return.
          - paragraph [ref=e98]: "As in many times before—Covid, WWII—it will seem as though the United States is asleep at the wheel—before, all at once, the government shifts into gear in the most extraordinary fashion. There will be a moment—in just a few years, just a couple more “2023-level” leaps in model capabilities and AI discourse—where it will be clear: we are on the cusp of AGI, and superintelligence shortly thereafter. While there’s a lot of flux within the exact mechanics, one way or another, the USG will be at the helm; the leading labs will (“voluntarily”) merge; Congress will appropriate trillions for chips and power; a coalition of democracies formed."
          - paragraph [ref=e99]: Startups are great for many things—but a startup on its own is simply not equipped for being in charge of the United States’ most important national defense project. We will need government involvement to have even a hope of defending against the all-out espionage threat we will face; the private AI efforts might as well be directly delivering superintelligence to the CCP. We will need the government to ensure even a semblance of a sane chain of command; you can’t have random CEOs (or random nonprofit boards) with the nuclear button. We will need the government to manage the severe safety challenges of superintelligence, to manage the fog of war of the intelligence explosion. We will need the government to deploy superintelligence to defend against whatever extreme threats unfold, to make it through the extraordinarily volatile and destabilized international situation that will follow. We will need the government to mobilize a democratic coalition to win the race with authoritarian powers, and forge (and enforce) a nonproliferation regime for the rest of the world. I wish it weren’t this way—but we will need the government. (Yes, regardless of the Administration.)
          - paragraph [ref=e100]: In any case, my main claim is not normative, but descriptive. In a few years, The Project will be on.
          - heading "The path to The Project" [level=2] [ref=e101]:
            - strong [ref=e102]: The path to The Project
          - paragraph [ref=e103]: "A turn-of-events seared into my memory is late February to mid-March of 2020. In those last weeks of February and early days of March, I was in utter despair: it seemed clear that we were on the covid-exponential: a plague was about to sweep the country, the collapse of our hospitals was imminent—and yet almost nobody took it seriously. The Mayor of New York was still dismissing Covid-fears as racism and encouraging people to go to Broadway shows. All I could do was buy masks and short the market."
          - paragraph [ref=e104]: And yet within just a few weeks, the entire country shut down and Congress had appropriated trillions of dollars (literally >10% of GDP). Seeing where the exponential might go ahead of time was too hard, but when the threat got close enough, existential enough, extraordinary forces were unleashed. The response was late, crude, blunt—but it came, and it was dramatic.
          - paragraph [ref=e105]: The next few years in AI will feel similar. We’re in the midgame now. 2023 was already a wild shift. AGI went from a fringe topic you’d be hesitant to associate with, to the subject of major Senate hearings and summits of world leaders. Given how early we are still, the level of USG engagement has been impressive to me. A couple more “2023”s, and the Overton window will be blown completely open.
          - paragraph [ref=e106]:
            - text: As we
            - link "race through the OOMs" [ref=e107] [cursor=pointer]:
              - /url: https://situational-awareness.ai/from-gpt-4-to-agi/
            - text: ", the leaps will continue. By 2025/2026 or so I expect the next truly shocking step-changes; AI will drive"
            - link "$100B+ annual revenues" [ref=e108] [cursor=pointer]:
              - /url: https://situational-awareness.ai/racing-to-the-trillion-dollar-cluster/
            - text: for big tech companies and outcompete PhDs in raw problem-solving smarts. Much as the Covid stock-market collapse made many take covid seriously, we’ll have $10T companies and the AI mania will be everywhere. If that’s not enough, by 2027/28, we’ll have models trained on the $100B+ cluster; full-fledged AI agents/drop-in remote workers will start to widely automate software engineering and other cognitive jobs. Each year, the acceleration will feel dizzying.
          - paragraph [ref=e109]: While many don’t yet see the possibility of AGI, eventually a consensus will form. Some, like Szilard, saw the possibility of an atomic bomb much earlier than others. Their alarm was not well-received initially; the possibility of a bomb was dismissed as remote (or at least, it was felt that the conservative and proper thing was to play down the possibility). Szilard’s fervent secrecy appeals were mocked and ignored. But many scientists, initially skeptical, started realizing a bomb was possible as more and more empirical results came in. Once a majority of scientists came to believe we were on the cusp of a bomb, the government, in turn, saw the national security exigency as too great—and the Manhattan Project got underway.
          - paragraph [ref=e110]:
            - text: As
            - link "the OOMs" [ref=e111] [cursor=pointer]:
              - /url: https://situational-awareness.ai/from-gpt-4-to-agi/
            - text: "go from theoretical extrapolation to (extraordinary) empirical reality, gradually, a consensus will form, too, among the leading scientists and executives and government officials: we are on the cusp, on the cusp of AGI, on the cusp of an intelligence explosion, on the cusp of superintelligence. And somewhere along here, we’ll get the first genuinely terrifying demonstrations of AI: perhaps the oft-discussed “helping novices make bioweapons,” or autonomously hacking critical systems, or something else entirely. It will become clear: like it or not, this technology will be an"
            - link "utterly decisive military technology" [ref=e112] [cursor=pointer]:
              - /url: https://situational-awareness.ai/the-free-world-must-prevail/#Whoever_leads_on_superintelligence_will_have_a_decisive_military_advantage
            - text: . Even if we’re lucky enough to not be in a major war, it seems likely that the CCP will have taken notice and launched a formidable AGI effort. Perhaps the eventual (inevitable) discovery of the CCP’s infiltration of America’s leading AI labs will cause a big stir.
          - paragraph [ref=e113]:
            - text: Somewhere around 26/27 or so, the mood in Washington will become somber. People will start to viscerally feel what is happening; they will be
            - emphasis [ref=e114]: scared
            - text: ". From the halls of the Pentagon to the backroom Congressional briefings will ring the obvious question, the question on everybody’s minds: do we need an AGI Manhattan Project? Slowly at first, then all at once, it will become clear: this is happening, things are going to get"
            - emphasis [ref=e115]: wild
            - text: ", this is the most important challenge for the national security of the United States since the invention of the atomic bomb. In one form or another, the national security state will get very heavily involved. The Project will be the necessary, indeed the only plausible, response."
          - paragraph [ref=e116]:
            - text: Of course, this is an extremely abbreviated account—a lot depends on when and how consensus forms, key warning shots, and so on. DC is infamously dysfunctional. As with Covid, and even the Manhattan Project, the government will be incredibly late and hamfisted.
            - link "After" [ref=e117] [cursor=pointer]:
              - /url: https://www.amazon.com/Making-Atomic-Bomb-Richard-Rhodes/dp/1451677618
            - text: Einstein’s letter to the President in 1939 (drafted by Szilard), an Advisory Committee on Uranium was formed. But officials were incompetent, and not much happened initially. For example, Fermi only got $6k (about $135k in today’s dollars) to support his research, and even that was not given easily and only received after months of waiting. Szilard believed that the project was
            - link "delayed for at least a year" [ref=e118] [cursor=pointer]:
              - /url: https://en.wikipedia.org/wiki/Lyman_James_Briggs#:~:text=Le%C3%B3%20Szil%C3%A1rd%20believed%20that%20the,action%20that%20was%20often%20needed.
            - text: by the short-sightedness and sluggishness of the authorities. In March 1941, the British government finally concluded a bomb was inevitable. The US committee initially entirely ignored this British report for months—until finally in December 1941, a full-scale atomic bomb effort was launched.
          - paragraph [ref=e119]:
            - text: There are many ways this could be operationalized in practice. To be clear, this doesn’t need to look like literal nationalization, with AI lab researchers now employed by the military or whatever (though it might!).
            - button [ref=e121] [cursor=pointer]:
              - img [ref=e122]
              - img [ref=e124]
              - img [ref=e126]
            - text: Rather, I expect a more suave orchestration. The relationship with the DoD might look like the relationship the DoD has with Boeing or Lockheed Martin. Perhaps via defense contracting or similar, a joint venture between the major cloud compute providers, AI labs, and the government is established, making it functionally a project of the national security state. Much like the AI labs “voluntarily” made commitments to the White House in 2023, Western labs might more-or-less “voluntarily” agree to merge in the national effort. And likely Congress will have to be involved, given the trillions of investment involved, and for checks-and-balances.
            - button [ref=e129] [cursor=pointer]:
              - img [ref=e130]
              - img [ref=e132]
              - img [ref=e134]
            - text: How all these details shake out is a story for another day.
          - paragraph [ref=e136]: But by late 26/27/28 it will be underway. The core AGI research team (a few hundred researchers) will move to a secure location; the trillion-dollar cluster will be built in record-speed; The Project will be on.
          - heading "Why The Project is the only way" [level=2] [ref=e137]:
            - strong [ref=e138]: Why The Project is the only way
          - paragraph [ref=e139]: I am under no illusions about the government. Governments face all sorts of limitations and poor incentives. I am a big believer in the American private sector, and would almost never advocate for heavy government involvement in technology or industry.
          - paragraph [ref=e140]: "I used to apply this same framework to AGI—until I joined an AI lab. AI labs are very good at some things: they’ve been able to take AI from an academic science project to the commercial big stage, in a way only a startup can. But ultimately, AI labs are still startups. We simply shouldn’t expect startups to be equipped to handle superintelligence."
          - paragraph [ref=e141]: There are no good options here—but I don’t see another way. When a technology becomes this important for national security, we will need the USG.
          - heading "Superintelligence will be the United States’ most important national defense project" [level=3] [ref=e142]:
            - strong [ref=e143]: Superintelligence will be the United States’ most important national defense project
          - paragraph [ref=e144]:
            - text: I’ve discussed the
            - link "power of superintelligence" [ref=e145] [cursor=pointer]:
              - /url: https://situational-awareness.ai/from-agi-to-superintelligence/#The_power_of_superintelligence
            - text: in previous pieces. Within years, superintelligence would completely
            - link "shake up the military balance of power" [ref=e146] [cursor=pointer]:
              - /url: https://situational-awareness.ai/the-free-world-must-prevail/
            - text: .
            - emphasis [ref=e147]
            - text: By the early 2030s, the entirety of the US arsenal (like it or not, the bedrock of global peace and security) will probably be obsolete. It will not just be a matter of modernization, but a wholesale replacement.
          - paragraph [ref=e148]: Simply put, it will become clear that the development of AGI will fall in a category more like nukes than the internet. Yes, of course it’ll be dual-use—but nuclear technology was dual-use too. The civilian applications will have their time. But in the fog of the AGI endgame, for better or for worse, national security will be the primary backdrop.
          - paragraph [ref=e149]: "We will need to completely reshape US forces, within a matter of years, in the face of rapid technological change—or risk being completely outmatched by adversaries who do. Perhaps most of all, the initial priority will be to deploy superintelligence for defensive applications, to develop countermeasures to survive untold new threats: adversaries with superhuman hacking capabilities, new classes of stealthy drone swarms that could execute a preemptive strike on our nuclear deterrent, the proliferation of advances in synthetic biology that can be weaponized, turbulent international (and national) power struggles, and rogue superintelligence projects."
          - paragraph [ref=e150]:
            - text: Whether nominally private or not, the AGI project will need to be,
            - emphasis [ref=e151]: will be,
            - text: integrally a defense project, and it will require extremely close cooperation with the national security state.
          - heading "A sane chain of command for superintelligence" [level=3] [ref=e152]:
            - strong [ref=e153]: A sane chain of command for superintelligence
          - paragraph [ref=e154]:
            - text: "The power—and the challenges—of superintelligence will fall into a very different reference class than anything else we’re used to seeing from tech companies. It seems pretty clear: this should not be under the unilateral command of a random CEO. Indeed, in the private-labs-developing-superintelligence world, it’s quite plausible individual CEOs would"
            - link "have the power" [ref=e155] [cursor=pointer]:
              - /url: https://situational-awareness.ai/from-agi-to-superintelligence/#The_power_of_superintelligence
            - emphasis [ref=e156]: to literally coup the US government
            - text: .
            - button [ref=e158] [cursor=pointer]:
              - img [ref=e159]
              - img [ref=e161]
              - img [ref=e163]
            - text: Imagine if Elon Musk had final command of the nuclear arsenal.
            - button [ref=e166] [cursor=pointer]:
              - img [ref=e167]
              - img [ref=e169]
              - img [ref=e171]
            - text: (Or if a random nonprofit board could decide to seize control of the nuclear arsenal.)
          - paragraph [ref=e173]:
            - text: "It is perhaps obvious, but: as a society, we’ve decided democratic governments should control the military;"
            - button [ref=e175] [cursor=pointer]:
              - img [ref=e176]
              - img [ref=e178]
              - img [ref=e180]
            - text: superintelligence will be, at least at first, the most powerful military weapon. The radical proposal is not The Project; the radical proposal is taking a bet on private AI CEOs wielding military power and becoming benevolent dictators.
          - paragraph [ref=e182]: (Indeed, in the private AI lab world, it would likely be even worse than random CEOs with the nuclear button—part of AI labs’ abysmal security is their utter lack of internal controls. That is, random AI lab employees (with zero vetting) could go rogue unnoticed.)
          - paragraph [ref=e183]: "We will need a sane chain of command—along with all the other processes and safeguards that necessarily come with responsibly wielding what will be comparable to a WMD—and it’ll require the government to do so. In some sense, this is simply a Burkean argument: the institutions, constitutions, laws, courts, checks and balances, norms and common dedication to the liberal democratic order (e.g., generals refusing to follow illegal orders), and so on that check the power of the government have withstood the test of hundreds of years. Special AI lab governance structures, meanwhile, collapsed the first time they were tested. The US military could already kill basically every civilian in the United States, or seize power, if it wanted to—and the way we keep government power over nuclear weapons in check is not through lots of private companies with their own nuclear arsenals. There’s only one chain of command and set of institutions that has proven itself up to this task."
          - paragraph [ref=e184]:
            - text: Again, perhaps you are a true libertarian and disagree normatively (let Elon Musk and Sam Altman command their own nuclear arsenals!)
            - button [ref=e186] [cursor=pointer]:
              - img [ref=e187]
              - img [ref=e189]
              - img [ref=e191]
            - text: But once it becomes clear that superintelligence is a principal matter of national security, I’m sure this is how the men and women in DC will look at it.
          - generic [ref=e194]:
            - heading "The civilian uses of superintelligence" [level=4] [ref=e195]: The civilian uses of superintelligence
            - paragraph [ref=e196]: Of course, that doesn’t mean the civilian applications of superintelligence will be reserved for the government.
            - list [ref=e197]:
              - listitem [ref=e198]: The nuclear chain reaction was first harnessed as a government project—and nuclear weapons permanently reserved for the government—but civilian nuclear energy flourished as private projects (in the 60s and 70s, before environmentalists shut it down).
              - listitem [ref=e199]: Boeing made the B-29 (the most expensive defense R&D project during WWII, more expensive than the Manhattan Project) and the B-47 and B-52 long-range bombers in partnership with the military—before using that technology for the Boeing 707, the commercial plane that ushered in the jet era. And today, while Boeing can only sell stealth fighter jets to the government, it can freely develop and sell civilian jets privately.
              - listitem [ref=e200]: And so it went for radar, satellites, rockets, gene technology, WWII factories, and so on.
            - paragraph [ref=e201]: The initial development of superintelligence will be dominated by the national security exigency to survive and stabilize an incredibly volatile period. And the military uses of superintelligence will remain reserved for the government, and safety norms will be enforced. But once the initial peril has passed, and the world has stabilized, the natural path is for the companies involved in the national consortium (and others) to privately pursue civilian applications.
            - paragraph [ref=e202]: Even in worlds with The Project, a private, pluralistic, market-based, flourishing ecosystem of civilian applications of superintelligence will have its day.
          - heading "Security" [level=3] [ref=e203]:
            - strong [ref=e204]: Security
          - paragraph [ref=e205]:
            - text: I’ve gone on about this at length in a
            - link "previous piece in the series" [ref=e206] [cursor=pointer]:
              - /url: https://situational-awareness.ai/lock-down-the-labs/
            - text: . On the current course, we may as well give up on having any American AGI effort; China can promptly steal all the algorithmic breakthroughs and the model weights (literally a copy of superintelligence) directly. It’s not even clear we’ll get to “North Korea-proof” security for superintelligence on the current course. In the private-startups-developing-AGI-world, superintelligence would proliferate to dozens of rogue states. It’s simply untenable.
          - paragraph [ref=e207]: "If we’re going to be at all serious about this, we obviously need to lock this stuff down. Most private companies have failed to take this seriously. But in any case, if we are to eventually face the full force of Chinese espionage (e.g., stealing the weights being the MSS’s #1 priority), it’s probably impossible for a private company to get good enough security. It will require extensive cooperation from the US intelligence community at that point to sufficiently secure AGI. This will involve invasive restrictions on AI labs and on the core team of AGI researchers, from extreme vetting to constant monitoring to working from a SCIF to reduced freedom to leave; and it will require infrastructure only the government can provide, ultimately including the physical security of the AGI datacenters themselves."
          - paragraph [ref=e208]: "In some sense, security alone is sufficient to necessitate the government project—both the free world’s preeminence and AI safety are doomed if we can’t lock this stuff down. (In fact, I think it’s fairly likely to be a major factor in the ultimate trigger: once the Chinese infiltration of the AGI labs becomes clear, every Senator and Congressperson and national security official will… have a strong opinion on the matter.)"
          - heading "Safety" [level=3] [ref=e209]:
            - strong [ref=e210]: Safety
          - paragraph [ref=e211]:
            - text: "Simply put: there are a lot of ways for us to mess this up—from ensuring we can reliably control and trust the billions of superintelligent agents that will soon be in charge of our economy and military ("
            - link "the superalignment problem" [ref=e212] [cursor=pointer]:
              - /url: https://situational-awareness.ai/superalignment/
            - text: ) to and controlling the risks of misuse of
            - link "new means of mass destruction" [ref=e213] [cursor=pointer]:
              - /url: https://situational-awareness.ai/the-free-world-must-prevail/#Maintaining_a_healthy_lead_will_be_decisive_for_safety
            - text: .
          - paragraph [ref=e214]: "Some AI labs claim to be committed to safety: acknowledging that what they are building, if gone awry, could cause catastrophe and promising that they will do what is necessary when the time comes. I do not know if we can trust their promise enough to stake the lives of every American on it. More importantly, so far, they have not demonstrated the competence, trustworthiness, or seriousness necessary for what they themselves acknowledge they are building."
          - paragraph [ref=e215]: At core, they are startups, with all the usual commercial incentives. Competition could push all of them to simply race through the intelligence explosion, and there will at least be some actors that will be willing to throw safety by the wayside. In particular, we may want to “spend some of our lead” to have time to solve safety challenges, but Western labs will need to coordinate to do so. (And of course, private labs will have already had their AGI weights stolen, so their safety precautions won’t even matter; we’ll be at the mercy of the CCP’s and North Korea’s safety precautions.)
          - paragraph [ref=e216]:
            - text: One answer is regulation. That may be appropriate in worlds in which AI develops more slowly, but I fear that regulation simply won’t be up to the nature of the challenge of the intelligence explosion. What’s necessary will be less like spending a few years doing careful evaluations and pushing some safety standards through a bureaucracy.
            - emphasis [ref=e217]: It’ll be more like fighting a war
            - text: .
          - paragraph [ref=e218]: We’ll face an insane year in which the situation is shifting extremely rapidly every week, in which hard calls based on ambiguous data will be life-or-death, in which the solutions—even the problems themselves—won’t be close to fully clear ahead of time but come down to competence in a “fog of war,” which will involve insane tradeoffs like “some of our alignment measurements are looking ambiguous, we don’t really understand what’s going on anymore, it might be fine but there’s some warning signs that the next generation of superintelligence might go awry, should we delay the next training run by 3 months to get more confidence on safety—but oh no, the latest intelligence reports indicate China stole our weights and is racing ahead on their own intelligence explosion, what should we do?”.
          - paragraph [ref=e219]: I’m not confident that a government project would be competent in dealing with this—but the “superintelligence developed by startups” alternative seems much closer to “praying for the best” than commonly recognized. We’ll need a chain of command that can bring to the table the seriousness that making these difficult tradeoffs will require.
          - heading "Stabilizing the international situation" [level=3] [ref=e220]:
            - strong [ref=e221]: Stabilizing the international situation
          - paragraph [ref=e222]: The intelligence explosion and its immediate aftermath will bring forth one of the most volatile and tense situations mankind has ever faced. Our generation is not used to this. But in this initial period, the task at hand will not be to build cool products. It will be to somehow, desperately, make it through this period.
          - paragraph [ref=e223]: "We’ll need the government project to win the race against the authoritarian powers—and to give us the clear lead and breathing room necessary to navigate the perils of this situation. We might as well give up if we can’t prevent the instant theft of superintelligence model weights. We will want to bundle Western efforts: bring together our best scientists, use every GPU we can find, and ensure the trillions of dollars of cluster buildouts happen in the United States. We will need to protect the datacenters against adversary sabotage, or outright attack."
          - paragraph [ref=e224]: Perhaps, most of all, it will take American leadership to develop—and if necessary, enforce—a nonproliferation regime. We’ll need to subvert Russia, North Korea, Iran, and terrorist groups from using their own superintelligence to develop technology and weaponry that would let them hold the world hostage. We’ll need to use superintelligence to harden the security of our critical infrastructure, military, and government to defend against extreme new hacking capabilities. We’ll need to use superintelligence to stabilize the offense/defense balance of advances in biology or similar. We’ll need to develop tools to safely control superintelligence, and to shut down rogue superintelligences that come out of others’ uncareful projects. AI systems and robots will be moving at 10-100x+ human speed; everything will start happening extremely quickly. We’ll need to be ready to handle whatever other six-sigma upheavals—and concomitant threats—come out of compressing a century’s worth of technological progress into a few years.
          - paragraph [ref=e225]: At least in this initial period, we will be faced with the most extraordinary national security exigency. Perhaps, nobody is up for this task. But of the options we have, The Project is the only sane one.
          - heading "The Project is inevitable; whether it’s good is not" [level=2] [ref=e226]:
            - strong [ref=e227]: The Project is inevitable; whether it’s good is not
          - paragraph [ref=e228]:
            - text: "Ultimately, my main claim here is descriptive: whether we like it or not, superintelligence won’t look like an SF startup, and in some way will be primarily in the domain of national security. I’ve brought up The Project a lot to my San Francisco friends in the past year. Perhaps what’s surprised me most is how surprised most people are about the idea. They simply haven’t considered the possibility. But once they consider it, most agree that it seems obvious. If we are at all right about what we think we are building,"
            - emphasis [ref=e229]: of course,
            - text: by the end this will be (in some form) a government project. If a lab developed literal superintelligence tomorrow,
            - emphasis [ref=e230]: of course
            - text: the Feds would step in.
          - paragraph [ref=e231]:
            - text: One important free variable is not
            - emphasis [ref=e232]: if
            - text: but
            - emphasis [ref=e233]: when
            - text: . Does the government not realize what’s happening until we’re in the middle of an intelligence explosion—or will it realize a couple years beforehand? If the government project is inevitable, earlier seems better. We’ll dearly need those couple years to do the security crash program, to get the key officials up to speed and prepared, to build a functioning merged lab, and so on. It’ll be far more chaotic if the government only steps in at the very end (and the secrets and weights will have already been stolen).
          - paragraph [ref=e234]: "Another important free variable is the international coalition we can rally: both a tighter alliance of democracies for developing superintelligence, and a broader benefit-sharing offer made to the rest of the world."
          - list [ref=e235]:
            - listitem [ref=e236]:
              - text: The former might look like the
              - link "Quebec Agreement" [ref=e237] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Quebec_Agreement
              - text: ": a secret pact between Churchill and Roosevelt to pool their resources to develop nuclear weapons, while not using them against each other or against others without mutual consent. We’ll want to bring in the UK (Deepmind), East Asian allies like Japan and South Korea (chip supply chain), and NATO/other core democratic allies (broader industrial base). A united effort will have more resources, talent, and control the whole supply chain; enable close coordination on safety, national security, and military challenges; and provide helpful checks and balances on wielding the power of superintelligence."
            - listitem [ref=e238]:
              - text: The latter might look like
              - link "Atoms for Peace" [ref=e239] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Atoms_for_Peace
              - text: ", the"
              - link "IAEA" [ref=e240] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/International_Atomic_Energy_Agency
              - text: ", and the"
              - link "NPT" [ref=e241] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Treaty_on_the_Non-Proliferation_of_Nuclear_Weapons
              - text: . We should offer to share the peaceful benefits of superintelligence with a broader group of countries (including non-democracies), and commit to not offensively using superintelligence against them. In exchange, they refrain from pursuing their own superintelligence projects, make safety commitments on the deployment of AI systems, and accept restrictions on dual-use applications. The hope is that this offer reduces the incentives for arms races and proliferation, and brings a broad coalition under a US-led umbrella for the post-superintelligence world order.
          - paragraph [ref=e242]:
            - text: Perhaps the most important free variable is simply whether the inevitable government project will be competent. How will it be organized? How can we get this done? How will the checks and balances work, and what does a sane chain of command look like? Scarcely any attention has gone into figuring this out.
            - button [ref=e244] [cursor=pointer]:
              - img [ref=e245]
              - img [ref=e247]
              - img [ref=e249]
            - text: Almost all other AI lab and AI governance politicking is a sideshow. This is the ballgame.
          - heading "The endgame" [level=2] [ref=e251]:
            - strong [ref=e252]: The endgame
          - paragraph [ref=e253]: And so by 27/28, the endgame will be on. By 28/29 the intelligence explosion will be underway; by 2030, we will have summoned superintelligence, in all its power and might.
          - figure "Oppenheimer and Groves." [ref=e254]:
            - emphasis [ref=e256]: Oppenheimer and Groves.
          - paragraph [ref=e257]:
            - text: "Whoever they put in charge of The Project is going to have a hell of a task: to build AGI, and to build it fast; to put the American economy on wartime footing to make hundreds of millions of GPUs; to lock it all down, weed out the spies, and fend off all-out attacks by the CCP; to somehow manage a hundred million AGIs furiously automating AI research, making a decade’s leaps in a year, and soon producing AI systems"
            - emphasis [ref=e258]: vastly
            - text: smarter than the smartest humans; to somehow keep things together enough that this doesn’t go off the rails and produce rogue superintelligence that tries to seize control from its human overseers; to use those superintelligences to develop whatever new technologies will be necessary to stabilize the situation and stay ahead of adversaries, rapidly remaking US forces to integrate those; all while navigating what will likely be the tensest international situation ever seen. They better be good, I’ll say that.
          - paragraph [ref=e259]: For those of us who get the call to come along for the ride, it’ll be . . . stressful. But it will be our duty to serve the free world—and all of humanity. If we make it through and get to look back on those years, it will be the most important thing we ever did. And while whatever secure facility they find probably won’t have the pleasantries of today’s ridiculously-overcomped-AI-researcher-lifestyle, it won’t be so bad. SF already feels like a peculiar AI-researcher-college-town; probably this won’t be so different. It’ll be the same weirdly-small circle sweating the scaling curves during the day and hanging out over the weekend, kibitzing over AGI and the lab-politics-of-the-day.
          - paragraph [ref=e260]: Except, well—the stakes will be all too real.
          - paragraph [ref=e261]: See you in the desert, friends.

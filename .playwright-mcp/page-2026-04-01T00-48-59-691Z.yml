              - listitem [ref=e558]:
                - paragraph [ref=e559]:
                  - text: See, for example, Zuck
                  - link "here" [ref=e560] [cursor=pointer]:
                    - /url: https://x.com/akhenosiris/status/1781162128881164566
                  - text: ; only ~45k of his H100s are in his largest training clusters, the vast majority of his 350k H100s for inference. Meta likely has heavier inference needs than other players, who serve fewer customers so far, but as everyone else’s AI products scale, I expect inference to become a strong majority of the GPUs.
                  - link "↩" [ref=e561] [cursor=pointer]:
                    - /url: "#note-3-138"
                    - img "↩" [ref=e562]
              - listitem [ref=e563]:
                - paragraph [ref=e564]:
                  - text: For example, this
                  - link "total-cost-of-ownership analysis" [ref=e565] [cursor=pointer]:
                    - /url: https://pytorchtoatoms.substack.com/p/metas-24k-h100-cluster-capextco-and
                  - text: estimates that around 40% of a large cluster cost is the H100 GPUs itself, and another 13% goes to Nvidia for Infiniband networking. That said, excluding cost of capital in that calculation would mean the GPUs are about 50% of the cost, and with networking would mean Nvidia gets a bit over 60% of the cost of the cluster.
                  - link "↩" [ref=e566] [cursor=pointer]:
                    - /url: "#note-4-138"

            - text: . Amazon
            - link "bought a 1GW datacenter campus" [ref=e169] [cursor=pointer]:
              - /url: https://www.datacenterdynamics.com/en/news/aws-acquires-talens-nuclear-data-center-campus-in-pennsylvania/
            - text: next to a nuclear power plant. Rumors
            - link "suggest" [ref=e170] [cursor=pointer]:
              - /url: https://twitter.com/rediminds/status/1749852816938529247?lang=en
            - text: a 1GW, 1.4M H100-equivalent cluster (~2026-cluster) is being built in Kuwait. Media report that
            - link "Microsoft and OpenAI are rumored to be working on a $100B cluster, slated for 2028" [ref=e171] [cursor=pointer]:
              - /url: https://www.reuters.com/technology/microsoft-openai-planning-100-billion-data-center-project-information-reports-2024-03-29/
            - text: (a cost comparable to the
            - link "International Space Station" [ref=e172] [cursor=pointer]:
              - /url: https://en.wikipedia.org/wiki/International_Space_Station_programme#:~:text=Cost,-This%20section%20is&text=The%20ISS%20has%20been%20described,cost%20was%20US%24150%20billion.
            - text: "!). And as each generation of models shocks the world, further acceleration may yet be in store."
          - paragraph [ref=e173]:
            - text: "Perhaps the wildest part is that willingness-to-spend doesn’t even seem to be the binding constraint at the moment, at least for training clusters. It’s finding the infrastructure itself: “Where do I find 10GW?” (power for the $100B+, trend 2028 cluster) is a favorite topic of conversation in SF. What any compute guy is thinking about is securing power, land, permitting, and datacenter construction."
            - button [ref=e175] [cursor=pointer]:
              - img [ref=e176]
              - img [ref=e178]
              - img [ref=e180]
            - text: While it may take you a year of waiting to get the GPUs, the lead times for these are much longer still.
          - paragraph [ref=e182]: The trillion-dollar cluster—+4 OOMs from the GPT-4 cluster, the ~2030 training cluster on the current trend—will be a truly extraordinary effort. The 100GW of power it’ll require is equivalent to >20% of US electricity production; imagine not just a simple warehouse with GPUs, but hundreds of power plants. Perhaps it will take a national consortium.
          - paragraph [ref=e183]:
            - text: (Note that I think it’s pretty likely we’ll only need a ~$100B cluster, or less, for AGI. The $1T cluster might be what we’ll train and run superintelligence on, or what we’ll use for AGI if AGI is harder than expected. In any case, in a post-AGI world, having the most compute will probably still really
            - emphasis [ref=e184]
            - text: matter.)
          - heading "Overall compute" [level=2] [ref=e185]:
            - strong [ref=e186]: Overall compute
          - paragraph [ref=e187]:
            - text: "The above are just rough numbers for the largest training clusters. Overall investment is likely to be much larger still: a large fraction of GPUs will probably be used for inference"
            - button [ref=e189] [cursor=pointer]:

          - paragraph [ref=e299]:
            - text: And these aren’t just my idiosyncratic numbers.
            - link "AMD forecasted" [ref=e300] [cursor=pointer]:
              - /url: https://www.bloomberg.com/news/articles/2023-12-06/amd-ceo-debuts-new-nvidia-chip-rival-gives-eye-popping-forecast?embedded-checkout=true
            - text: a $400B AI accelerator market by 2027, implying $700B+ of total AI spending, pretty close to my numbers (and they are surely much less “AGI-pilled” than I am). Sam Altman is reported to be in talks to raise funds for a project of “
            - link "up to $7T" [ref=e301] [cursor=pointer]:
              - /url: https://www.wsj.com/tech/ai/sam-altman-seeks-trillions-of-dollars-to-reshape-business-of-chips-and-ai-89ab3db0
            - text: ” in capex to build out AI compute capacity (the number was widely mocked, but it seems less crazy if you run the numbers here…). One way or another, this massive scaleup is happening.
          - heading "Will it be done? Can it be done?" [level=2] [ref=e302]:
            - strong [ref=e303]: Will it be done? Can it be done?
          - paragraph [ref=e304]: The scale of investment postulated here may seem fantastical. But both the demand-side and the supply-side seem like they could support the above trajectory. The economic returns justify the investment, the scale of expenditures is not unprecedented for a new general-purpose technology, and the industrial mobilization for power and chips is doable.
          - heading "AI revenue" [level=3] [ref=e305]:
            - strong [ref=e306]: AI revenue
          - paragraph [ref=e307]: Companies will make large AI investments if they expect the economic returns to justify it.
          - paragraph [ref=e308]:
            - text: Reports suggest OpenAI was at a $1B revenue run rate in
            - link "August 2023" [ref=e309] [cursor=pointer]:
              - /url: https://www.theinformation.com/articles/openai-passes-1-billion-revenue-pace-as-big-companies-boost-ai-spending
            - text: ", and a $2B revenue run rate in"
            - link "February 2024" [ref=e310] [cursor=pointer]:
              - /url: https://www.reuters.com/technology/openai-hits-2-bln-revenue-milestone-ft-2024-02-09/
            - text: . That’s roughly a doubling every 6 months. If that trend holds, we should see a ~$10B annual run rate by late 2024/early 2025, even without pricing in a massive surge from any next-generation model. One estimate puts
            - link "Microsoft" [ref=e311] [cursor=pointer]:
              - /url: https://x.com/ttunguz/status/1783941512159776840
            - text: at ~$5B of incremental AI revenue already.
          - paragraph [ref=e312]: "So far, every 10x scaleup in AI investment seems to yield the necessary returns. GPT-3.5 unleashed the ChatGPT mania. The estimated $500M cost for the GPT-4 cluster would have been paid off by the reported billions of annual revenue for Microsoft and OpenAI (see above calculations), and a “2024-class” training cluster in the billions will easily pay off if Microsoft/OpenAI AI revenue continues on track to a $10B+ revenue run rate. The boom is investment-led: it takes time from a huge order of GPUs to build the clusters, build the models, and roll them out, and the clusters being planned today are many years out. But if the returns on the last GPU order keep materializing, investment will continue to skyrocket (and outpace revenue), plowing in even more capital in a bet that the next 10x will keep paying off."
          - paragraph [ref=e313]: "A key milestone for AI revenue that I like to think about is: when will a big tech company (Google, Microsoft, Meta, etc.) hit a $100B revenue run rate from AI (products and API)? These companies have on the order of $100B-$300B of revenue today; $100B would thus start representing a very substantial fraction of their business. Very naively extrapolating out the doubling every 6 months, supposing we hit a $10B revenue run rate in early 2025, suggests this would happen mid-2026."
          - paragraph [ref=e314]:
            - text: That may seem like a stretch, but it seems to me to require surprisingly little imagination to reach that milestone. For example, there are around
            - link "350 million paid subscribers to Microsoft Office" [ref=e315] [cursor=pointer]:
              - /url: https://office365itpros.com/2022/04/28/office-365-number-of-users/
            - text: —could you get a third of these to be willing to pay $100/month for an AI add-on? For an average worker, that’s only a few hours a month of productivity gained; models powerful enough to make that justifiable seem very doable in the next couple years.
            - button [ref=e317] [cursor=pointer]:
              - img [ref=e318]
              - img [ref=e320]
              - img [ref=e322]
          - paragraph [ref=e324]:
            - text: It’s hard to understate the ensuing reverberations. This would make AI products the biggest revenue driver for America’s largest corporations, and
            - emphasis [ref=e325]: by far
            - text: their biggest area of growth. Forecasts of overall revenue growth for these companies would skyrocket. Stock markets would follow; we might see our first $10T company soon thereafter. Big tech at this point would be willing to go all out, each investing many hundreds of billions (at least) into further AI scaleout. We probably see our first many-hundred-billion dollar corporate bond sale then.
            - button [ref=e327] [cursor=pointer]:
              - img [ref=e328]
              - img [ref=e330]
              - img [ref=e332]
          - paragraph [ref=e334]:
            - text: Beyond $100B, it gets harder to see the contours. But if we are truly on the path to AGI, the returns will be there. White-collar workers are paid tens of trillions of dollars in wages annually worldwide; a drop-in remote worker that automates even a fraction of white-collar/cognitive jobs (imagine, say, a truly automated AI coder) would pay for the trillion-dollar cluster. If nothing else, the national security import could well motivate a government project, bundling the nation’s resources in the race to AGI (
            - link "more later" [ref=e335] [cursor=pointer]:
              - /url: https://situational-awareness.ai/the-project/
            - text: ).
          - heading "Historical precedents" [level=3] [ref=e336]:
            - strong [ref=e337]: Historical precedents
          - paragraph [ref=e338]: "$1T/year of total annual AI investment by 2027 seems outrageous. But it’s worth taking a look at other historical reference classes:"
          - list [ref=e339]:
            - listitem [ref=e340]:
              - text: In their peak years of funding, the Manhattan and Apollo programs
              - link "reached 0.4% of GDP" [ref=e341] [cursor=pointer]:
                - /url: https://sgp.fas.org/crs/misc/RL34645.pdf
              - text: ", or ~$100 billion annually today (surprisingly small!). At $1T/year, AI investment would be about 3% of GDP."
            - listitem [ref=e342]:
              - text: Between 1996–2001,
              - link "telecoms invested" [ref=e343] [cursor=pointer]:
                - /url: https://www.latimes.com/archives/la-xpm-2002-jun-30-fi-billions30-story.html
              - text: nearly $1 trillion in today’s dollars in building out internet infrastructure.
            - listitem [ref=e344]:
              - text: From 1841 to 1850,
              - link "private British railway investments totaled" [ref=e345] [cursor=pointer]:
                - /url: https://x.com/michael_nielsen/status/1782129830932210166
              - text: a cumulative ~40% of British GDP at the time. A similar fraction of
              - link "US GDP" [ref=e346] [cursor=pointer]:
                - /url: https://fred.stlouisfed.org/series/GDP
              - text: would be equivalent to ~$11T over a decade.
            - listitem [ref=e347]:
              - link "Many trillions" [ref=e348] [cursor=pointer]:
                - /url: https://www2.deloitte.com/content/dam/Deloitte/global/Documents/deloitte-financing-the-green-energy-transition-report-2023.pdf
              - text: are being spent on the green transition.
            - listitem [ref=e349]:
              - text: Rapidly-growing economies often spend a high fraction of their GDP on investment; for example, China has spent more than
              - link "40% of its GDP on investment for two decades" [ref=e350] [cursor=pointer]:
                - /url: https://carnegieendowment.org/chinafinancialmarkets/91161#:~:text=It%20currently%20invests%2042%E2%80%9344,percent%20in%202010%20and%202011
              - text: (equivalent to $11T
              - emphasis [ref=e351]: annually
              - text: given US GDP).
            - listitem [ref=e352]:
              - text: In the historically most exigent national security circumstances—wartime—borrowing to finance the national effort has often comprised enormous fractions of GDP. During WWI, the
              - link "UK" [ref=e353] [cursor=pointer]:
                - /url: https://bankunderground.co.uk/2017/08/08/your-country-needs-funds-the-extraordinary-story-of-britains-early-efforts-to-finance-the-first-world-war/
              - text: and
              - link "France" [ref=e354] [cursor=pointer]:
                - /url: https://encyclopedia.1914-1918-online.net/article/war_finance_france
              - text: ", and"
              - link "Germany" [ref=e355] [cursor=pointer]:
                - /url: https://encyclopedia.1914-1918-online.net/article/war_finance_germany
              - text: borrowed over 100% of their GDPs while the
              - link "US" [ref=e356] [cursor=pointer]:
                - /url: https://www.theatlantic.com/business/archive/2012/11/the-long-story-of-us-debt-from-1790-to-2011-in-1-little-chart/265185/
              - text: borrowed over 20%; during WWII, the
              - link "UK" [ref=e357] [cursor=pointer]:
                - /url: https://obr.uk/box/post-world-war-ii-debt-reduction/
              - text: and Japan borrowed over 100% of their GDPs while the
              - link "US" [ref=e358] [cursor=pointer]:
                - /url: https://www.theatlantic.com/business/archive/2012/11/the-long-story-of-us-debt-from-1790-to-2011-in-1-little-chart/265185/
              - text: borrowed over 60% of GDP (equivalent to over $17T today).
          - paragraph [ref=e359]:
            - text: $1T/year of total AI investment by 2027 would be dramatic—among the very largest capital buildouts ever—but would not be unprecedented. And a trillion-dollar individual training cluster by the end of the decade seems on the table.
            - button [ref=e361] [cursor=pointer]:
              - img [ref=e362]
              - img [ref=e364]
              - img [ref=e366]
          - heading "Power" [level=3] [ref=e368]:
            - strong [ref=e369]: Power
          - paragraph [ref=e370]:
            - text: Probably the single biggest constraint on the supply-side will be
            - link "power" [ref=e371] [cursor=pointer]:
              - /url: https://www.wsj.com/business/energy-oil/big-techs-latest-obsession-is-finding-enough-energy-f00055b2
            - text: ". Already, at nearer-term scales (1GW/2026 and especially 10GW/2028), power has become the binding constraint: there simply isn’t much spare capacity, and power contracts are usually long-term locked-in. And building, say, a new gigawatt-class nuclear power plant takes a decade. (I’ll wonder when we’ll start seeing things like tech companies buying"
            - link "aluminum smelting companies" [ref=e372] [cursor=pointer]:
              - /url: https://en.wikipedia.org/wiki/Aluminerie_Alouette
            - text: for their gigawatt-class power contracts.
            - button [ref=e374] [cursor=pointer]:
              - img [ref=e375]
              - img [ref=e377]
              - img [ref=e379]
            - text: )
          - figure "Comparing trends on total US electricity production to our rough back of the envelope estimates on AI electricity demands." [ref=e382]:
            - emphasis [ref=e384]: Comparing trends on total US electricity production to our rough back of the envelope estimates on AI electricity demands.
          - paragraph [ref=e385]:
            - text: Total US electricity generation has
            - link "barely grown 5% in the last decade" [ref=e386] [cursor=pointer]:
              - /url: https://en.wikipedia.org/wiki/Electricity_sector_of_the_United_States
            - text: .
            - button [ref=e388] [cursor=pointer]:
              - img [ref=e389]
              - img [ref=e391]
              - img [ref=e393]
            - text: Utilities are
            - link "starting to get excited" [ref=e395] [cursor=pointer]:
              - /url: https://twitter.com/hayekandkeynes/status/1776365744323780997?s=12
            - text: about AI (
            - link "instead of" [ref=e396] [cursor=pointer]:
              - /url: https://www.wsj.com/business/energy-oil/data-centers-energy-georgia-development-7a5352e9?st=gi5gnqcodm9uy16
            - text: 2.6% growth over the next 5 years, they now estimate 4.7%!). But they’re barely pricing in what’s coming. The trillion-dollar, 100GW cluster alone would require ~20% of current US electricity generation in 6 years; together with large inference capacity, demand will be multiples higher.
          - paragraph [ref=e397]: To most, this seems completely out of the question. Some are betting on Middle Eastern autocracies, who have been going around offering boundless power and giant clusters to get their rulers a seat at the AGI-table.
          - paragraph [ref=e398]:
            - text: "But it’s totally possible to do this in the United States: we have abundant natural gas."
            - button [ref=e400] [cursor=pointer]:
              - img [ref=e401]
              - img [ref=e403]
              - img [ref=e405]
          - list [ref=e407]:
            - listitem [ref=e408]: Powering a 10GW cluster would take only a few percent of US natural gas production and could be done rapidly.
            - listitem [ref=e409]:
              - text: Even the 100GW cluster is surprisingly doable.
              - list [ref=e410]:
                - listitem [ref=e411]:
                  - text: Right now the Marcellus/Utica shale (around Pennsylvania) alone is
                  - link "producing" [ref=e412] [cursor=pointer]:
                    - /url: https://www.eia.gov/petroleum/drilling/pdf/appalachia.pdf
                  - text: around 36 billion cubic feet a day of gas; that would be enough to generate just under 150GW continuously with generators (and combined cycle power plants could output 250 GW due to their higher efficiency).
                - listitem [ref=e413]:
                  - text: It would take about ~1200
                  - link "new wells" [ref=e414] [cursor=pointer]:
                    - /url: https://ir.rangeresources.com/static-files/cd9b4c2c-f4fe-4118-9659-a4c3528b95b1
                  - text: for the 100GW cluster.
                  - button [ref=e416] [cursor=pointer]:
                    - img [ref=e417]
                    - img [ref=e419]
                    - img [ref=e421]
                  - text: Each rig can drill roughly 3 wells per month, so 40 rigs (the current
                  - link "rig count" [ref=e423] [cursor=pointer]:
                    - /url: https://www.eia.gov/petroleum/drilling/pdf/appalachia.pdf
                  - text: in the Marcellus) could build up the production base for 100GW in less than a year.
                  - button [ref=e425] [cursor=pointer]:
                    - img [ref=e426]
                    - img [ref=e428]
                    - img [ref=e430]
                  - text: The Marcellus had a rig count of ~80 as recently as 2019 so it would not be taxing to add 40 rigs to build up the production base.
                  - button [ref=e433] [cursor=pointer]:
                    - img [ref=e434]
                    - img [ref=e436]
                    - img [ref=e438]
                - listitem [ref=e440]:
                  - text: More generally, US natural gas production has more than
                  - link "doubled in a decade" [ref=e441] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/Shale_gas_in_the_United_States#/media/File:Shale_gas_production_USA.svg
                  - text: ; simply continuing that trend could power multiple trillion-dollar datacenters.
                  - button [ref=e443] [cursor=pointer]:
                    - img [ref=e444]
                    - img [ref=e446]
                    - img [ref=e448]
                - listitem [ref=e450]:
                  - text: The harder part would be building enough generators/turbines; this wouldn’t be trivial, but it seems doable with about $100B of capex
                  - button [ref=e452] [cursor=pointer]:
                    - img [ref=e453]
                    - img [ref=e455]
                    - img [ref=e457]
                  - text: for 100GW of natural gas power plants. Combined cycle plants can be built in about two years; the timeline for generators would be even shorter still.
                  - button [ref=e460] [cursor=pointer]:
                    - img [ref=e461]
                    - img [ref=e463]
                    - img [ref=e465]
          - paragraph [ref=e467]:
            - text: The barriers to even trillions of dollars of datacenter buildout in the US are entirely self-made. Well-intentioned but rigid climate commitments (not just by the government, but green datacenter commitments by Microsoft, Google, Amazon, and so on) stand in the way of the obvious, fast solution. At the very least, even if we won’t do natural gas, a broad deregulatory agenda would unlock the solar/batteries/SMR/geothermal megaprojects. Permitting, utility regulation, FERC regulation of
            - link "transmission lines" [ref=e468] [cursor=pointer]:
              - /url: https://ifp.org/how-cost-allocation-works-for-transmission-lines/
            - text: ", and NEPA environmental review makes things that should take a few years take a decade or more. We don’t have that kind of time."
          - paragraph [ref=e469]: We’re going to drive the AGI datacenters to the Middle East, under the thumb of brutal, capricious autocrats. I’d prefer clean energy too—but this is simply too important for US national security. We will need a new level of determination to make this happen. The power constraint can, must, and will be solved.
          - heading "Chips" [level=3] [ref=e470]:
            - strong [ref=e471]: Chips
          - paragraph [ref=e472]: While chips are usually what comes to mind when people think about AI-supply-constraints, they’re likely a smaller constraint than power. Global production of AI chips is still a pretty small percent of TSMC-leading-edge production, likely less than 10%. There’s a lot of room to grow via AI becoming a larger share of TSMC production.
          - paragraph [ref=e473]:
            - text: Indeed, 2024 production of AI chips (~5-10M H100-equivalents) would already be almost enough for the $100s of billion cluster (if they were all diverted to one cluster). From a pure logic fab standpoint ~100% of TSMC’s output for a year could already support the trillion-dollar cluster (again if all the chips went to one datacenter).
            - button [ref=e475] [cursor=pointer]:
              - img [ref=e476]
              - img [ref=e478]
              - img [ref=e480]
            - text: Of course, not all of TSMC will be able to be diverted to AI, and not all of AI chip production for a year will be for one training cluster. Total AI chip demand (including inference and multiple players) by 2030 will be a multiple of TSMC’s current total leading-edge logic chip capacity, just for AI. TSMC ~
            - link "doubled" [ref=e482] [cursor=pointer]:
              - /url: https://www.macrotrends.net/stocks/charts/TSM/taiwan-semiconductor-manufacturing/revenue
            - button [ref=e484] [cursor=pointer]:
              - img [ref=e485]
              - img [ref=e487]
              - img [ref=e489]
            - text: in the past 5 years; they’d likely need to go ~at least twice as fast on their pace of expansion to meet AI chip demand. Massive new fab investments would be necessary.
          - paragraph [ref=e491]:
            - text: Even if raw logic fabs won’t be the constraint, chip-on-wafer-on-substrate (CoWoS) advanced packaging (connecting chips to memory, also made by TSMC, Intel, and others) and HBM memory (for which demand
            - link "is" [ref=e492] [cursor=pointer]:
              - /url: https://twitter.com/ericjhonsa/status/1770545692978925955?s=12
            - link "enormous" [ref=e493] [cursor=pointer]:
              - /url: https://twitter.com/dnystedt/status/1787662436478410867?s=12
            - text: ) are already key bottlenecks for the current AI GPU scaleup; these are more specialized to AI, unlike the pure logic chips, so there’s less pre-existing capacity. In the near term, these will be the primary constraint on churning out more GPUs, and these will be the huge constraints as AI scales. Still, these are comparatively “easy” to scale; it’s been incredible watching TSMC literally build “greenfield” fabs (i.e. entirely new facilities from scratch) to massively scale up CoWoS production this year (and Nvidia is even starting to find
            - link "CoWoS alternatives" [ref=e494] [cursor=pointer]:
              - /url: https://x.com/dnystedt/status/1793096268400759110?s=46&t=EfdUOH7OfS4lpc8-o1U6Dg
            - text: to work around the shortage).
          - paragraph [ref=e495]:
            - text: A new TSMC
            - link "Gigafab" [ref=e496] [cursor=pointer]:
              - /url: https://www.asianometry.com/p/the-economics-of-tsmcs-giga-fabs
            - text: (a
            - link "technological marvel" [ref=e497] [cursor=pointer]:
              - /url: https://www.construction-physics.com/p/how-to-build-a-20-billion-semiconductor
            - text: ) costs around $20B in capex and produces 100k wafer-starts a month. For hundreds of millions of AI GPUs a year by the end of the decade, TSMC would need to build dozens of these—as well as a huge buildout for memory, advanced packaging, networking, etc., which will be a major fraction of capex. It could add up to over $1T of capex. It will be intense, but doable. (Perhaps the biggest roadblock will not be feasibility, but TSMC not even trying—TSMC does not yet seem AI-scaling-pilled! They think AI will “only” grow at a
            - link "glacial 50% CAGR" [ref=e498] [cursor=pointer]:
              - /url: https://www.fierceelectronics.com/ai/tsmc-bullish-ai-q1-revenues-rises-q2-outlook-bright
            - text: .)
          - paragraph [ref=e499]:
            - text: Recent USG efforts like the CHIPS Act have been trying to onshore more AI chip production to the US (as insurance in case of the Taiwan contingency). While onshoring more of AI chip production to the US would be nice, it’s less critical than having the actual datacenter (on which the AGI lives) in the US. If having chip production abroad is like having uranium deposits abroad, having the AGI datacenter abroad is like having the literal nukes be built and stored abroad. Given the dysfunction and cost we’ve seen from building fabs in the US in practice, my guess is we should prioritize datacenters in the US while betting more heavily on democratic allies like Japan and South Korea for fab projects—fab buildouts there
            - link "seem much more functional" [ref=e500] [cursor=pointer]:
              - /url: https://twitter.com/dnystedt/status/1768446340881907914?s=12
            - text: .
          - heading "The Clusters of Democracy" [level=2] [ref=e501]:
            - strong [ref=e502]: The Clusters of Democracy
          - paragraph [ref=e503]: Before the decade is out, many trillions of dollars of compute clusters will have been built. The only question is whether they will be built in America. Some are rumored to be betting on building them elsewhere, especially in the Middle East. Do we really want the infrastructure for the Manhattan Project to be controlled by some capricious Middle Eastern dictatorship?
          - paragraph [ref=e504]:
            - text: "The clusters that are being planned today may well be the clusters AGI and superintelligence are trained and run on, not just the “cool-big-tech-product clusters.” The national interest demands that these are built in America (or close democratic allies). Anything else creates an irreversible security risk: it risks the AGI weights getting stolen"
            - button [ref=e506] [cursor=pointer]:
              - img [ref=e507]
              - img [ref=e509]
              - img [ref=e511]
            - text: (and perhaps be
            - link "shipped to China" [ref=e513] [cursor=pointer]:
              - /url: https://www.nytimes.com/2023/11/27/us/politics/ai-us-uae-china-security-g42.html
            - text: ) (
            - link "more later" [ref=e514] [cursor=pointer]:
              - /url: https://situational-awareness.ai/lock-down-the-labs/
            - text: ); it risks these dictatorships physically seizing the datacenters (to build and run AGI themselves) when the AGI race gets hot; or even if these threats are only wielded implicity, it puts AGI and superintelligence at unsavory dictator’s whims. America sorely regretted her energy dependence on the Middle East in the 70s, and we worked so hard to get out from under their thumbs. We cannot make the same mistake again.
          - paragraph [ref=e515]: The clusters can be built in the US, and we have to get our act together to make sure it happens in the US. American national security must come first, before the allure of free-flowing Middle Eastern cash, arcane regulation, or even, yes, admirable climate commitments. We face a real system competition—can the requisite industrial mobilization only be done in “top-down” autocracies? If American business is unshackled, America can build like none other (at least in red states). Being willing to use natural gas, or at the very least a broad-based deregulatory agenda—NEPA exemptions, fixing FERC and transmission permitting at the federal level, overriding utility regulation, using federal authorities to unlock land and rights of way—is a national security priority.
          - separator [ref=e516]
          - paragraph [ref=e517]: In any case—the exponential is in full swing now.
          - paragraph [ref=e518]: In the “old days,” when AGI was still a dirty word, some colleagues and I used to make theoretical economic models of what the path to AGI might look like. One feature of these models used to be a hypothetical “AI wakeup” moment, when the world started realizing how powerful these models could be and began rapidly ramping up their investments—culminating in multiple % of GDP towards the largest training runs.
          - paragraph [ref=e519]:
            - text: It seemed far-off then, but that time has come. 2023
            - emphasis [ref=e520]: was
            - text: “AI wakeup.”
            - button [ref=e522] [cursor=pointer]:
              - img [ref=e523]
              - img [ref=e525]
              - img [ref=e527]
            - text: Behind the scenes, the most staggering techno-capital acceleration has been put into motion.
          - paragraph [ref=e529]: Brace for the G-forces.
          - paragraph [ref=e531]:
            - text: "Next post in series:"

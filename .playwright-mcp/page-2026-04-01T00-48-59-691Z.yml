              - img [ref=e192]
              - img [ref=e194]
            - text: (GPUs to actually run the AI systems for products), and there could be multiple players with giant clusters in the race.
          - paragraph [ref=e196]: "My rough estimate is that 2024 will already feature $100B-$200B of AI investment:"
          - list [ref=e197]:
            - listitem [ref=e198]:
              - text: Nvidia datacenter revenue will hit a ~$25B/quarter run rate soon, i.e. ~$100B of capex flowing via Nvidia alone. But of course, Nvidia isn’t the only player (Google’s TPUs are great too!), and close to half of datacenter capex is on things other than the chips (site, building, cooling, power, etc.)

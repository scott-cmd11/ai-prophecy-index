          - generic [ref=e547]:
            - separator [ref=e548]
            - list [ref=e549]:
              - listitem [ref=e550]:
                - paragraph [ref=e551]:
                  - text: As mentioned, OOM = order of magnitude, 10x = 1 order of magnitude
                  - link "↩" [ref=e552] [cursor=pointer]:
                    - /url: "#note-1-138"
                    - img "↩" [ref=e553]
              - listitem [ref=e554]:
                - paragraph [ref=e555]:
                  - text: One key uncertainty is how distributed training will be—if instead of needing that amount of power in one location, we could spread it among 100 locations, it’d be a lot easier.
                  - link "↩" [ref=e556] [cursor=pointer]:
                    - /url: "#note-2-138"

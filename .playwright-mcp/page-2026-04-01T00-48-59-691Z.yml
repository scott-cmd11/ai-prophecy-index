                  - text: (H100s are made on 5nm). At 5-10 million H100-equivalents in 2024, that’s 150k-300k wafers per year for annual AI chip production in 2024.
                  - text: Depending on where in that range and whether we want to count 7nm production, that’s about 3-10% of annual leading-edge wafer production.

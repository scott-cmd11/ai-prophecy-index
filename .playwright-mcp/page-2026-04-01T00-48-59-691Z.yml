              - listitem [ref=e581]:
                - paragraph [ref=e582]:
                  - text: "I estimate Nvidia is going to ship on the order of 5M datacenter GPUs in 2024. A minority of those are B100s, which we’ll count as 2x+ H100s. Then there’s the other AI chips: TPUs, Trainium, Meta’s custom silicon, AMD GPUs, etc."
                  - link "↩" [ref=e583] [cursor=pointer]:

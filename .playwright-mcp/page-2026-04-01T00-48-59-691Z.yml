              - listitem [ref=e568]:
                - paragraph [ref=e569]:
                  - text: And
                  - link "apparently" [ref=e570] [cursor=pointer]:
                    - /url: https://www.cnbc.com/2024/04/25/microsoft-says-cloud-ai-demand-exceeds-supply-despite-spending-surge.html
                  - text: ", despite Microsoft growing capex by 79% compared to a year ago in a recent quarter, their AI cloud demand still exceeds supply!"
                  - link "↩" [ref=e571] [cursor=pointer]:
                    - /url: "#note-5-138"
                    - img "↩" [ref=e572]
              - listitem [ref=e573]:
                - paragraph [ref=e574]:
                  - text: A larger fraction of global GPU production will probably be going to the largest training cluster in the future than today, e.g. because of a consolidation to just a few leading labs, rather than many companies having frontier-model-scale clusters.
                  - link "↩" [ref=e575] [cursor=pointer]:

              - listitem [ref=e593]:
                - paragraph [ref=e594]:
                  - text: A big uncertainty for me is what the lags are for the technology to diffuse and be adopted. I think it’s plausible revenue is slowed because intermediate, pre-AGI models take a lot of “schlep” to properly integrate into company workflows; historically, it’s taken a while to fully harvest the productivity gains from new general purpose technologies. This is where the “
                  - link "sonic boom" [ref=e595] [cursor=pointer]:
                    - /url: https://situational-awareness.ai/from-gpt-4-to-agi/#sonic_boom
                  - text: "” discussion earlier comes in: as we “unhobble” models and they start looking more like agents/drop-in remote workers,, deploying them becomes much easier. Rather than having to completely remake some workflow to harvest a 25% productivity gain from a GPT-chatbot, instead you’ll get models that you can onboard and work with as you would a new coworker (e.g., just directly substitute for an engineer, rather than needing to train up engineers to use some new tool). Or, in the extreme, and later on: you won’t need to completely redesign a factory to work with some new tool, you’ll just bring in the humanoid robots."
                - paragraph [ref=e596]:
                  - text: That said, this may lead to some discontinuity in economic value and revenue generated, depending on how quickly we can “unhobble” models.
                  - link "↩" [ref=e597] [cursor=pointer]:
                    - /url: "#note-10-138"
                    - img "↩" [ref=e598]
              - listitem [ref=e599]:
                - paragraph [ref=e600]:
                  - text: What will happen to interest rates will be interesting… see
                  - link "Tyler Cowen here" [ref=e601] [cursor=pointer]:
                    - /url: https://www.bloomberg.com/opinion/articles/2024-03-27/ai-could-have-a-surprising-effect-on-interest-rates?sref=o4HC3q1q
                  - text: ;
                  - link "Chow, Mazlish and Halperin here" [ref=e602] [cursor=pointer]:
                    - /url: https://basilhalperin.com/papers/agi_emh.pdf
                  - text: .
                  - link "↩" [ref=e603] [cursor=pointer]:
                    - /url: "#note-11-138"
                    - img "↩" [ref=e604]
              - listitem [ref=e605]:
                - paragraph [ref=e606]:
                  - text: And, farther out, but if AGI truly led to substantial increases in economic growth, $10T+ annually would start being plausible—the reference class being investment rates of countries during high-growth periods.
                  - link "↩" [ref=e607] [cursor=pointer]:
                    - /url: "#note-12-138"
                    - img "↩" [ref=e608]
              - listitem [ref=e609]:
                - paragraph [ref=e610]:
                  - text: “Since 2011, the Alouette Smelter uses 930 MW electricity at maximum production capacity.”
                  - link "↩" [ref=e611] [cursor=pointer]:
                    - /url: "#note-13-138"
                    - img "↩" [ref=e612]
              - listitem [ref=e613]:
                - paragraph [ref=e614]:
                  - text: "That said, this is “net-new” capacity: some of that is building new renewables and taking old fossil fuel plants off the grid. Maybe it’s closer to a percent or two a year of gross-new capacity."
                  - link "↩" [ref=e615] [cursor=pointer]:
                    - /url: "#note-14-138"
                    - img "↩" [ref=e616]
              - listitem [ref=e617]:
                - paragraph [ref=e618]:
                  - text: Thanks to
                  - link "Austin Vernon" [ref=e619] [cursor=pointer]:
                    - /url: https://austinvernon.site/
                  - text: (private correspondence) for helping with these estimates.
                  - link "↩" [ref=e620] [cursor=pointer]:
                    - /url: "#note-15-138"
                    - img "↩" [ref=e621]
              - listitem [ref=e622]:
                - paragraph [ref=e623]:
                  - text: New wells produce around 0.01 BCF per day.
                  - link "↩" [ref=e624] [cursor=pointer]:
                    - /url: "#note-16-138"
                    - img "↩" [ref=e625]
              - listitem [ref=e626]:
                - paragraph [ref=e627]:
                  - text: Each well produces ~20 BCF over its lifetime, meaning two new wells a month would replace the depleted reserves, i.e. it would need only one rig to maintain the production.
                  - link "↩" [ref=e628] [cursor=pointer]:
                    - /url: "#note-17-138"
                    - img "↩" [ref=e629]
              - listitem [ref=e630]:
                - paragraph [ref=e631]:
                  - text: Though it would be more efficient to add less rigs and build up over a longer time frame than 10 months.
                  - link "↩" [ref=e632] [cursor=pointer]:
                    - /url: "#note-18-138"
                    - img "↩" [ref=e633]
              - listitem [ref=e634]:
                - paragraph [ref=e635]:
                  - text: A cubic foot of natural gas
                  - link "generates about" [ref=e636] [cursor=pointer]:
                    - /url: https://www.eia.gov/tools/faqs/faq.php?id=667&t=6
                  - text: 0.13 kWh. Shale gas production
                  - link "was about" [ref=e637] [cursor=pointer]:
                    - /url: https://en.wikipedia.org/wiki/Shale_gas_in_the_United_States#/media/File:Shale_gas_production_USA.svg
                  - text: ~70 billion cubic feet per day in the US in 2020. Suppose we doubled production again, and the extra capacity all went to compute clusters. That’s 3322 TWh/year of electricity, or enough for almost 4 100GW clusters.
                  - link "↩" [ref=e638] [cursor=pointer]:
                    - /url: "#note-19-138"
                    - img "↩" [ref=e639]
              - listitem [ref=e640]:
                - paragraph [ref=e641]:
                  - text: The capex costs for natural gas power plants
                  - link "seem to be" [ref=e642] [cursor=pointer]:
                    - /url: https://atb-archive.nrel.gov/electricity/2019/index.html?t=cg
                  - text: under $1000 per kW, meaning the capex for 100GW of natural gas power plants would be about $100 billion.
                  - link "↩" [ref=e643] [cursor=pointer]:
                    - /url: "#note-20-138"
                    - img "↩" [ref=e644]
              - listitem [ref=e645]:
                - paragraph [ref=e646]:
                  - text: Solar and batteries aren’t a totally crazy alternative, but it does just seem rougher than natural gas. I did appreciate
                  - link "Casey Handmer’s calculation" [ref=e647] [cursor=pointer]:
                    - /url: https://caseyhandmer.wordpress.com/2024/03/12/how-to-feed-the-ais/
                  - text: "of tiling the Earth in solar panels:"
                  - text: “With current GPUs, the global solar datacenter’s compute is equivalent to ~150 billion humans, though if our computers can eventually match [human brain] efficiency, we could support more like 5 quadrillion AI souls.”
                  - link "↩" [ref=e648] [cursor=pointer]:
                    - /url: "#note-21-138"
                    - img "↩" [ref=e649]
              - listitem [ref=e650]:
                - paragraph [ref=e651]:
                  - text: This poses the interesting question of why power requirements are going up so much before chip fab production starts being really constrained. A simple answer is while datacenters run continuously at close to max power, most chips currently produced are idle a lot of the time. Currently, smartphones are close to half of leading chip demand, but use a lot less energy per wafer area (trading transistors for serial operations and energy efficiency) and have low utilization as smartphones are mostly idle. The AI revolution means working our transistors way harder, dedicating them all to constantly-running, high-performance AI datacenters instead of idle, battery-powered/energy-saving devices. HT Carl Shulman for this point.
                  - link "↩" [ref=e652] [cursor=pointer]:
                    - /url: "#note-22-138"
                    - img "↩" [ref=e653]
              - listitem [ref=e654]:
                - paragraph [ref=e655]:
                  - text: (Using revenue as a proxy.)
                  - link "↩" [ref=e656] [cursor=pointer]:
                    - /url: "#note-23-138"
                    - img "↩" [ref=e657]
              - listitem [ref=e658]:
                - paragraph [ref=e659]:
                  - text: It’s a lot easier to do side-channel attacks to exfiltrate weights with physical access!
                  - link "↩" [ref=e660] [cursor=pointer]:
                    - /url: "#note-24-138"
                    - img "↩" [ref=e661]
              - listitem [ref=e662]:
                - paragraph [ref=e663]:
                  - text: I distinctly remember writing “THE TAKEOFF HAS STARTED” on my whiteboard in March of 2023.
                  - link "↩" [ref=e664] [cursor=pointer]:
                    - /url: "#note-25-138"
                    - img "↩" [ref=e665]
              - listitem [ref=e666]:
                - paragraph [ref=e667]:
                  - text: Mainstream sell-side analysts seem to assume only 10-20% year-over-year growth in Nvidia revenue from CY24 to CY25, maybe $120B-$130B in CY25 (or at least did until very recently). Insane! It’s been pretty obvious for a while that Nvidia is going to do over $200B of revenue in CY25.
                  - link "↩" [ref=e668] [cursor=pointer]:

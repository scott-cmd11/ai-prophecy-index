          - paragraph [ref=e276]:
            - emphasis [ref=e277]: With each OOM of effective compute, models predictably, reliably get better.
            - button [ref=e279] [cursor=pointer]:
              - img [ref=e280]
              - img [ref=e282]
              - img [ref=e284]
            - text: If we can count the OOMs, we can (roughly, qualitatively) extrapolate capability improvements.
            - button [ref=e287] [cursor=pointer]:
              - img [ref=e288]
              - img [ref=e290]
              - img [ref=e292]
            - text: That’s how a few prescient individuals saw GPT-4 coming.
          - paragraph [ref=e294]: "We can decompose the progress in the four years from GPT-2 to GPT-4 into three categories of scaleups:"
          - list [ref=e295]:
            - listitem [ref=e296]:
              - emphasis [ref=e297]: Compute
              - text: ": We’re using much bigger computers to train these models."
            - listitem [ref=e298]:
              - emphasis [ref=e299]: Algorithmic efficiencies
              - text: ": There’s a continuous trend of algorithmic progress. Many of these act as “compute multipliers,” and we can put them on a unified scale of growing"
              - emphasis [ref=e300]: effective compute
              - text: .
            - listitem [ref=e301]:
              - emphasis [ref=e302]: ”Unhobbling” gains
              - text: ": By default, models learn a lot of amazing raw capabilities, but they are hobbled in all sorts of dumb ways, limiting their practical value. With simple algorithmic improvements like reinforcement learning from human feedback (RLHF), chain-of-thought (CoT), tools, and scaffolding, we can unlock significant latent capabilities."
          - paragraph [ref=e303]: "We can “count the OOMs” of improvement along these axes: that is, trace the scaleup for each in units of effective compute. 3x is 0.5 OOMs; 10x is 1 OOM; 30x is 1.5 OOMs; 100x is 2 OOMs; and so on. We can also look at what we should expect on top of GPT-4, from 2023 to 2027."
          - paragraph [ref=e304]: "I’ll go through each one-by-one, but the upshot is clear: we are rapidly racing through the OOMs. There are potential headwinds in the data wall, which I’ll address—but overall, it seems likely that we should expect another GPT-2-to-GPT-4-sized jump, on top of GPT-4, by 2027."
          - heading "Compute" [level=3] [ref=e305]:
            - strong [ref=e306]: Compute
          - paragraph [ref=e307]: "I’ll start with the most commonly-discussed driver of recent progress: throwing (a lot) more compute at models."
          - paragraph [ref=e308]:
            - text: Many people assume that this is simply due to Moore’s Law. But even in the old days when Moore’s Law was in its heyday, it was comparatively
            - emphasis [ref=e309]: glacial
            - text: —perhaps 1-1.5 OOMs per decade. We are seeing much more rapid scaleups in compute—close to 5x the speed of Moore’s law—instead because of mammoth investment. (Spending even a million dollars on a single model used to be an outrageous thought nobody would entertain, and now that’s pocket change!)

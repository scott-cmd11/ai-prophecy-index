          - heading "Algorithmic efficiencies" [level=3] [ref=e349]:
            - strong [ref=e350]: Algorithmic efficiencies
          - paragraph [ref=e351]: While massive investments in compute get all the attention, algorithmic progress is probably a similarly important driver of progress (and has been dramatically underrated).
          - paragraph [ref=e352]:
            - text: To see just how big of a deal algorithmic progress can be, consider the following illustration of the drop in price to attain ~50% accuracy on the MATH benchmark (high school competition math) over just
            - emphasis [ref=e353]: two years.
            - text: (For comparison, a computer science PhD student who didn’t particularly like math scored 40%, so this is already quite good.)
            - emphasis [ref=e354]
            - text: Inference efficiency improved by nearly 3 OOMs—1,000x—in less than two years.
          - figure "Rough estimate on relative inference cost of attaining ~50% MATH performance." [ref=e356]:
            - generic [ref=e357]:

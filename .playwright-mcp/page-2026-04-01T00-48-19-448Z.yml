          - paragraph [ref=e242]:
            - text: Over and over again, year after year, skeptics have claimed “deep learning won’t be able to do X” and have been quickly proven wrong.
            - button [ref=e244] [cursor=pointer]:
              - img [ref=e245]
              - img [ref=e247]
              - img [ref=e249]
            - emphasis [ref=e251]: If there’s one lesson we’ve learned from the past decade of AI, it’s that you should never bet against deep learning.

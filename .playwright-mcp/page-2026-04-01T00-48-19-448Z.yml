              - emphasis [ref=e380]: .
          - paragraph [ref=e381]: "That’s a huge deal: that means 4 years later, we can achieve the same performance for ~100x less compute (and concomitantly, much higher performance for the same compute!)."
          - paragraph [ref=e382]:
            - text: Unfortunately, since labs don’t publish internal data on this, it’s harder to measure algorithmic progress for frontier LLMs over the last four years.

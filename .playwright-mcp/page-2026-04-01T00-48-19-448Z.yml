              - text: )
          - paragraph [ref=e96]: "GPT-4’s capabilities came as a shock to many: an AI system that could write code and essays, could reason through difficult math problems, and ace college exams. A few years ago, most thought these were impenetrable walls."
          - paragraph [ref=e97]: But GPT-4 was merely the continuation of a decade of breakneck progress in deep learning. A decade earlier, models could barely identify simple images of cats and dogs; four years earlier, GPT-2 could barely string together semi-plausible sentences. Now we are rapidly saturating all the benchmarks we can come up with. And yet this dramatic progress has merely been the result of consistent trends in scaling up deep learning.
          - paragraph [ref=e98]: There have been people who have seen this for far longer. They were scoffed at, but all they did was trust the trendlines. The trendlines are intense, and they were right. The models, they just want to learn; you scale them up, and they learn more.
          - paragraph [ref=e99]:
            - text: "I make the following claim:"
            - strong [ref=e100]: it is strikingly plausible that by 2027, models will be able to do the work of an AI researcher/engineer.
            - text: That doesn’t require believing in sci-fi; it just requires believing in straight lines on a graph.
          - figure "Rough estimates of past and future scaleup of effective compute (both physical compute and algorithmic efficiencies), based on the public estimates discussed in this piece. As we scale models, they consistently get smarter, and by “counting the OOMs” we get a rough sense of what model intelligence we should expect in the (near) future. (This graph shows only the scaleup in base models; “unhobblings” are not pictured.)" [ref=e102]:
            - emphasis [ref=e104]: Rough estimates of past and future scaleup of effective compute (both physical compute and algorithmic efficiencies), based on the public estimates discussed in this piece. As we scale models, they consistently get smarter, and by “counting the OOMs” we get a rough sense of what model intelligence we should expect in the (near) future. (This graph shows only the scaleup in base models; “unhobblings” are not pictured.)
          - paragraph [ref=e105]:
            - text: "In this piece, I will simply “count the OOMs” (OOM = order of magnitude, 10x = 1 order of magnitude): look at the trends in 1)"
            - emphasis [ref=e106]: compute
            - text: ", 2)"
            - emphasis [ref=e107]: algorithmic efficiencies
            - text: (algorithmic progress that we can think of as growing “effective compute”), and 3)
            - emphasis [ref=e108]: ”unhobbling” gains
            - text: (fixing obvious ways in which models are hobbled by default, unlocking latent capabilities and giving them tools, leading to step-changes in usefulness). We trace the growth in each over four years before GPT-4, and what we should expect in the four years after, through the end of 2027. Given deep learning’s consistent improvements for every OOM of effective compute, we can use this to project future progress.
          - paragraph [ref=e109]:
            - text: Publicly, things
            - link "have been quiet" [ref=e110] [cursor=pointer]:
              - /url: https://x.com/leopoldasch/status/1768868127138549841
            - text: for a year since the GPT-4 release, as the next generation of models has been in the oven—leading some to proclaim stagnation and that deep learning is hitting a wall.
            - button [ref=e112] [cursor=pointer]:
              - img [ref=e113]
              - img [ref=e115]
              - img [ref=e117]
            - text: But by counting the OOMs, we get a peek at what we should actually expect.
          - paragraph [ref=e119]: The upshot is pretty simple. GPT-2 to GPT-4—from models that were impressive for sometimes managing to string together a few coherent sentences, to models that ace high-school exams—was not a one-time gain. We are racing through the OOMs extremely rapidly, and the numbers indicate we should expect another ~100,000x effective compute scaleup—resulting in another GPT-2-to-GPT-4-sized qualitative jump—over four years. Moreover, and critically, that doesn’t just mean a better chatbot; picking the many obvious low-hanging fruit on “unhobbling” gains should take us from chatbots to agents, from a tool to something that looks more like drop-in remote worker replacements.
          - paragraph [ref=e120]:
            - text: While the inference is simple, the implication is striking. Another jump like that very well could take us to AGI, to models as smart as PhDs or experts that can work beside us as coworkers. Perhaps most importantly, if these AI systems could automate AI research itself, that would set in motion intense feedback loops—the topic of the
            - link "next piece in the series" [ref=e121] [cursor=pointer]:
              - /url: https://situational-awareness.ai/from-agi-to-superintelligence/
            - text: .
          - paragraph [ref=e122]: Even now, barely anyone is pricing all this in. But situational awareness on AI isn’t actually that hard, once you step back and look at the trends. If you keep being surprised by AI capabilities, just start counting the OOMs.

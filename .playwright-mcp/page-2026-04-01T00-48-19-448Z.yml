          - paragraph [ref=e344]:
            - text: The compute scaleup from GPT-2 to GPT-3 in a year was an unusual overhang, but all the indications are that the longer-run trend will continue. The SF-rumor-mill is abuzz with dramatic tales of huge GPU orders. The investments involved will be extraordinary—but they are in motion. I go into this more later in the series, in
            - link "IIIa. Racing to the Trillion-Dollar Cluster" [ref=e345] [cursor=pointer]:

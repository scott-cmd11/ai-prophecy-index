          - paragraph [ref=e367]:
            - text: Though these are numbers just for inference efficiency (which may or may not correspond to training efficiency improvements, where numbers are harder to infer from public data), they make clear there is an
            - emphasis [ref=e368]: enormous
            - text: amount of algorithmic progress possible and happening.
          - paragraph [ref=e369]:
            - text: In this piece, I’ll separate out two kinds of algorithmic progress. Here, I’ll start by covering “within-paradigm” algorithmic improvements—those that simply result in better base models, and that straightforwardly act as
            - emphasis [ref=e370]: compute efficiencies
            - text: or
            - emphasis [ref=e371]: compute multipliers
            - text: . For example, a better algorithm might allow us to achieve the same performance but with 10x less training compute. In turn, that would act as a 10x (1 OOM) increase in
            - emphasis [ref=e372]: effective compute
            - text: . (Later, I’ll cover “unhobbling,” which you can think of as “paradigm-expanding/application-expanding” algorithmic progress that unlocks capabilities of base models.)
          - paragraph [ref=e373]: If we step back and look at the long-term trends, we seem to find new algorithmic improvements at a fairly consistent rate. Individual discoveries seem random, and at every turn, there seem insurmountable obstacles—but the long-run trendline is predictable, a straight line on a graph. Trust the trendline.
          - paragraph [ref=e374]: We have the best data for ImageNet (where algorithmic research has been mostly public and we have data stretching back a decade), for which we have consistently improved compute efficiency by roughly ~0.5 OOMs/year across the 9-year period between 2012 and 2021.
          - 'figure "We can measure algorithmic progress: how much less compute is needed in 2021 compared to 2012 to train a model with the same performance? We see a trend of ~0.5 OOMs/yr of algorithmic efficiency. Source: Erdil and Besiroglu 2022." [ref=e375]':

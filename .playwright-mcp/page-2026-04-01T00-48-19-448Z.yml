            - text: On everything from AP exams to the SAT, GPT-4 scores better than the vast majority of high schoolers.
            - text: Of course, even GPT-4 is still somewhat uneven; for some tasks it’s much better than smart high-schoolers, while there are other tasks it can’t yet do. That said, I tend to think most of these limitations come down to obvious ways models are still hobbled, as I’ll

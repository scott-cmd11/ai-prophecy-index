                - emphasis [ref=e197]: Our World in Data
          - paragraph [ref=e198]:
            - text: We’re literally running out of benchmarks. As an anecdote, my friends Dan and Collin made a benchmark called
            - link "MMLU" [ref=e199] [cursor=pointer]:
              - /url: https://arxiv.org/abs/2009.03300
            - text: "a few years ago, in 2020. They hoped to finally make a benchmark that would stand the test of time, equivalent to all the hardest exams we give high school and college students. Just three years later, it’s basically solved: models like GPT-4 and Gemini get ~90%."
          - paragraph [ref=e200]:
            - text: More broadly, GPT-4 mostly cracks all the standard high school and college aptitude tests.
            - button [ref=e202] [cursor=pointer]:

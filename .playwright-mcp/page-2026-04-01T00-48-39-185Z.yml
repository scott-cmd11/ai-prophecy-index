          - generic [ref=e359]:
            - separator [ref=e360]
            - list [ref=e361]:
              - listitem [ref=e362]:
                - paragraph [ref=e363]:
                  - text: For example, Yi-Large
                  - link "seems to be" [ref=e364] [cursor=pointer]:
                    - /url: https://www.reddit.com/r/singularity/comments/1cyoun2/yilarge_catching_up_to_gpt4_overtakes_claude_3/

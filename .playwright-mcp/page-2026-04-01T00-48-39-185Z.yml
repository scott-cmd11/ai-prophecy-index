            - text: in AI than the US, they don’t seem to have driven any of the key breakthroughs in recent years.
          - paragraph [ref=e159]: "That’s all merely a prelude, however. If and when the CCP wakes up to AGI, we should expect extraordinary efforts on the part of the CCP to compete. And I think there’s a pretty clear path for China to be in the game: outbuild the US and steal the algorithms."
          - heading "1. Compute" [level=4] [ref=e160]:
            - strong [ref=e161]: 1. Compute
          - paragraph [ref=e162]:
            - strong [ref=e163]: "1a. Chips:"
            - text: China now seems to have demonstrated the ability to
            - link "manufacture 7nm chips" [ref=e164] [cursor=pointer]:
              - /url: https://www.semianalysis.com/p/china-ai-and-semiconductors-rise
            - text: . While going beyond 7nm will be difficult (requiring EUV), 7nm is enough! For reference, 7nm is what Nvidia A100s used. The indigenous Huawei Ascend 910B, based on the SMIC 7nm platform, seems to only be ~2-3x worse on performance/$ than an equivalent Nvidia chip would be.
            - button [ref=e166] [cursor=pointer]:
              - img [ref=e167]
              - img [ref=e169]
              - img [ref=e171]
          - paragraph [ref=e173]:
            - text: The
            - link "yield" [ref=e174] [cursor=pointer]:
              - /url: https://www.semianalysis.com/p/china-ai-and-semiconductors-rise
            - text: of SMIC’s 7nm production and the general maturity of Chinese abilities here is debated,
            - button [ref=e176] [cursor=pointer]:
              - img [ref=e177]
              - img [ref=e179]
              - img [ref=e181]
            - text: and a critical open question is in what quantities they could produce these 7nm chips.
            - button [ref=e184] [cursor=pointer]:
              - img [ref=e185]
              - img [ref=e187]
              - img [ref=e189]
            - text: Still, it seems like there’s at least a very reasonable chance they’ll be able to do this at large scale in a few years.
          - paragraph [ref=e191]:
            - text: Most of the gains in AI chips have come from improved chip design adapting them for AI use cases (and China likely already steals Nvidia chip designs from the Taiwan supply chain).
            - button [ref=e193] [cursor=pointer]:
              - img [ref=e194]
              - img [ref=e196]
              - img [ref=e198]
            - text: 7nm vs. 3nm or 2nm, and their general fab immaturity, probably makes things more expensive for China.
            - button [ref=e201] [cursor=pointer]:
              - img [ref=e202]
              - img [ref=e204]
              - img [ref=e206]
            - text: But that seems by no means fatal; you can make very good AI chips on top of a 7nm process. I wouldn’t have high confidence by this point, for example, that they couldn’t just spend a bit more and get ample compute for the $100B+ and trillion-dollar training clusters in a few years.
            - button [ref=e209] [cursor=pointer]:
              - img [ref=e210]
              - img [ref=e212]
              - img [ref=e214]
          - paragraph [ref=e216]:
            - strong [ref=e217]: "1b. Outbuilding the US:"
            - text: The binding constraint on the largest training clusters won’t be chips, but industrial mobilization—perhaps most of all the
            - link "100GW of power for the trillion-dollar cluster" [ref=e218] [cursor=pointer]:
              - /url: https://situational-awareness.ai/racing-to-the-trillion-dollar-cluster/
            - text: . But if there’s one thing China can do better than the US it’s
            - emphasis [ref=e219]: building stuff.
          - paragraph [ref=e220]:
            - text: In the last decade, China has roughly built as much new electricity capacity as
            - emphasis [ref=e221]: the entire US capacity
            - text: (while US capacity has remained basically flat).
            - emphasis [ref=e222]
            - text: In the US, these things get stuck in environmental review, permitting, and regulation for a decade first. It thus seems quite plausible that China will be able to simply outbuild the US on the largest training clusters.
          - figure "The AI power buildout for 2030 seems much more doable for China than the US. Based on earlier estimates from Racing to the Trillion-Dollar Cluster." [ref=e224]:
            - generic [ref=e225]:
              - emphasis [ref=e226]:
                - text: The AI power buildout for 2030 seems much more doable for China than the US. Based on earlier estimates from
                - link "Racing to the Trillion-Dollar Cluster" [ref=e227] [cursor=pointer]:
                  - /url: https://situational-awareness.ai/racing-to-the-trillion-dollar-cluster/
              - text: .
          - heading "2. Algorithms" [level=4] [ref=e228]:
            - text: "2."
            - strong [ref=e229]: Algorithms
          - paragraph [ref=e230]:
            - text: As discussed extensively in
            - link "Counting the OOMs" [ref=e231] [cursor=pointer]:
              - /url: https://situational-awareness.ai/from-gpt-4-to-agi/
            - text: ", scaling compute is only part of the story: algorithmic advances probably contribute at least half of AI progress. We’re developing the key algorithmic breakthroughs for AGI"
            - emphasis [ref=e232]: right now
            - text: (essentially the EUV of algorithms because of the
            - link "data wall" [ref=e233] [cursor=pointer]:
              - /url: https://situational-awareness.ai/from-gpt-4-to-agi/#The_data_wall
            - text: ).
          - paragraph [ref=e234]: By default, I expect Western labs to be well ahead; they have much of the key talent, and in recent years have developed all of the key breakthroughs. The size of the advantage may well be equivalent to a 10x (or even 100x) bigger cluster in a few years; this would provide the United States with a reasonably comfortable lead.
          - paragraph [ref=e235]:
            - text: "And yet, on the current course, we will completely surrender this advantage: as discussed extensively in the"
            - link "security section" [ref=e236] [cursor=pointer]:
              - /url: https://situational-awareness.ai/lock-down-the-labs/
            - text: ", the current state of security essentially makes it trivial for China to infiltrate American labs. And so, unless we lock down the labs very soon, I expect China to be able to simply steal the key algorithmic ingredients for AGI, and match US capabilities."
            - button [ref=e238] [cursor=pointer]:
              - img [ref=e239]
              - img [ref=e241]
              - img [ref=e243]
          - paragraph [ref=e246]:
            - text: "(Even worse, if we don’t improve security, there’s an even more salient path for China to compete. They won’t even need to train their own AGI: they’ll just be able to steal the AGI weights directly. Once they’ve stolen a copy of the"
            - link "automated AI researcher" [ref=e247] [cursor=pointer]:
              - /url: https://situational-awareness.ai/from-agi-to-superintelligence/
            - text: ", they’ll be off to the races, and can launch their own intelligence explosion. If they’re willing to apply less caution—both good caution, and unreasonable regulation and delay—than the US, they could race through the intelligence explosion more quickly, outrunning us to superintelligence.)"
          - separator [ref=e248]
          - paragraph [ref=e249]: To date, US tech companies have made a much bigger bet on AI and scaling than any Chinese efforts; consequently, we are well ahead. But counting out China now is a bit like counting out Google in the AI race when ChatGPT came out in late 2022. Google hadn’t yet focused their efforts in an intense AI bet, and it looked as though OpenAI was far ahead—but once Google woke up, a year and half later, they are putting up a very serious fight. China, too, has a clear path to putting up a very serious fight. If and when the CCP mobilizes in the race to AGI, the picture could start looking very different.
          - paragraph [ref=e250]:
            - text: Perhaps the Chinese government will be incompetent; perhaps they decide AI threatens the CCP and impose
            - link "stifling regulation" [ref=e251] [cursor=pointer]:
              - /url: https://cset.georgetown.edu/publication/china-ai-law-draft
            - text: . But I wouldn’t count on it.
          - paragraph [ref=e252]: I, for one, think we need to operate under the assumption that we will face a full-throated Chinese AGI effort. As every year we get dramatic leaps in AI capability, as we start seeing early automation of software engineers, as AI revenue explodes and we start seeing $10T valuations and trillion-dollar cluster buildouts, as a broader consensus starts to form that we are on the cusp of AGI—the CCP will take note. Much as I expect these leaps to wake up the USG to AGI, I would expect it to wake up the CCP to AGI—and to wake up to what being behind on AGI would mean for their national power.
          - paragraph [ref=e253]: They will be a formidable adversary.
          - heading "The authoritarian peril" [level=2] [ref=e254]:
            - strong [ref=e255]: The authoritarian peril
          - paragraph [ref=e256]: A dictator who wields the power of superintelligence would command concentrated power unlike any we’ve ever seen. In addition to being able to impose their will on other countries, they could enshrine their rule internally. Millions of AI-controlled robotic law enforcement agents could police their populace; mass surveillance would be hypercharged; dictator-loyal AIs could individually assess every citizen for dissent, with advanced near-perfect lie detection rooting out any disloyalty.
          - paragraph [ref=e257]: Most importantly, the robotic military and police force could be wholly controlled by a single political leader, and programmed to be perfectly obedient—no more risk of coups or popular rebellions.
          - paragraph [ref=e258]:
            - text: Whereas past dictatorships were never permanent, superintelligence could eliminate basically all historical threats to a dictator’s rule and lock in their power (cf
            - link "value lock-in" [ref=e259] [cursor=pointer]:
              - /url: https://docs.google.com/document/d/1mkLFhxixWdT5peJHq4rfFzq4QbHyfZtANH1nou68q88/edit#heading=h.w0odoleyhzrt
            - text: ). If the CCP gets this power, they could enforce the Party’s conception of “truth” totally and completely.
          - paragraph [ref=e260]:
            - text: To be clear, I don’t just worry about dictators getting superintelligence because “our values are better.” I believe in freedom and democracy, strongly, because I don’t know what the right values are. In the long arc of history, “
            - link "time has upset many fighting faiths" [ref=e261] [cursor=pointer]:
              - /url: https://supreme.justia.com/cases/federal/us/250/616/#tab-opinion-1928348
            - text: .” I believe we should
            - link "place our faith in mechanisms of error correction" [ref=e262] [cursor=pointer]:
              - /url: https://www.forourposterity.com/burkean-longtermism/
            - text: ", experimentation, competition, and adaption."
          - paragraph [ref=e263]: Superintelligence will give those who wield it the power to crush opposition, dissent, and lock in their grand plan for humanity. It will be difficult for anyone to resist the terrible temptation to use this power. I hope, dearly, that we can instead rely on the wisdom of the Framers—letting radically different values flourish, and preserving the raucous plurality that has defined the American experiment.
          - paragraph [ref=e264]:
            - text: At stake in the AGI race will not just be the advantage in some far-flung proxy war, but whether freedom and democracy can survive for the next century and beyond. The course of human history is as brutal as it is clear. Twice in the 20th century tyranny threatened the globe; we must be under no delusion that this threat is banished forever. For many of my young friends, freedom and democracy feel like a given—but they are not. By far the most common political system in history is authoritarianism.
            - button [ref=e266] [cursor=pointer]:
              - img [ref=e267]
              - img [ref=e269]
              - img [ref=e271]
          - paragraph [ref=e273]:
            - text: "I genuinely do not know the intentions of the CCP and their authoritarian allies. But, as a reminder: the CCP is a regime founded on the"
            - link "continued worship" [ref=e274] [cursor=pointer]:
              - /url: https://english.news.cn/20231226/b7f98403ef3b4c01add52d2c93148f66/c.html
            - text: of perhaps the
            - link "greatest totalitarian mass-murderer" [ref=e275] [cursor=pointer]:
              - /url: https://en.wikipedia.org/wiki/Mao_Zedong
            - text: in human history (“with estimates ranging from 40 to 80 million victims due to starvation, persecution, prison labor, and mass executions”); a regime that recently put a million Uyghurs in
            - link "concentration camps" [ref=e276] [cursor=pointer]:
              - /url: https://www.theatlantic.com/the-uyghur-chronicles/
            - text: and
            - link "crushed" [ref=e277] [cursor=pointer]:
              - /url: https://www.economist.com/china/2023/08/24/the-world-should-study-chinas-crushing-of-hong-kongs-freedoms
            - text: a free Hong Kong; a regime that systematically practices mass surveillance for social control, both of the
            - link "new-fangled" [ref=e278] [cursor=pointer]:
              - /url: https://www.nytimes.com/2022/06/21/world/asia/china-surveillance-investigation.html
            - text: (tracking phones, DNA databases, facial recognition, and so on) and the
            - link "old-fangled" [ref=e279] [cursor=pointer]:
              - /url: https://www.nytimes.com/2024/05/25/world/asia/china-surveillance-xi.html
            - text: (recruiting an army of citizens to report on their neighbors) kind; a regime that ensures
            - link "all text messages" [ref=e280] [cursor=pointer]:
              - /url: https://citizenlab.ca/2020/05/wechat-surveillance-explained/
            - text: passes through a censor, and that goes so far to repress dissent as to
            - link "pull families into police stations" [ref=e281] [cursor=pointer]:
              - /url: https://www.amnesty.org/en/latest/news/2024/05/china-overseas-students-face-harassment-and-surveillance-in-campaign-of-transnational-repression/
            - text: when their child overseas attends a protest; a regime that
            - link "has cemented" [ref=e282] [cursor=pointer]:
              - /url: https://www.bbc.com/news/world-asia-china-43361276
            - text: Xi Jinping as dictator-for-life; a regime that touts its aims to militarily crush and “
            - link "reeducate" [ref=e283] [cursor=pointer]:
              - /url: https://sg.news.yahoo.com/china-educate-taiwan-takes-over-101045402.html
            - text: ” a free neighboring nation; a regime that
            - link "explicitly seeks" [ref=e284] [cursor=pointer]:
              - /url: https://www.uscc.gov/sites/default/files/testimonies/SFR%20for%20USCC%20TobinD%2020200313.pdf
            - text: a China-centric world order.
          - paragraph [ref=e285]:
            - emphasis [ref=e286]: The free world must prevail over the authoritarian powers in this race.
            - text: We owe our peace and freedom to American economic and military preeminence. Perhaps even empowered with superintelligence, the CCP will behave responsibly on the international stage, leaving each to their own. But the history of dictators of their ilk is not pretty. If America and her allies fail to win this race, we risk it all.
          - heading "Maintaining a healthy lead will be decisive for safety" [level=2] [ref=e287]:
            - strong [ref=e288]: Maintaining a healthy lead will be decisive for safety
          - paragraph [ref=e289]: "It is the cursed history of science and technology that as they have unfolded their wonders, they have also expanded the means of destruction: from sticks and stones, to swords and spears, rifles and cannons, machine guns and tanks, bombers and missiles, nuclear weapons. The “destruction/$” curve has consistently gone down as technology has advanced. We should expect the rapid technological progress post-superintelligence to follow this trend."
          - paragraph [ref=e290]: Perhaps dramatic advances in biology will yield extraordinary new bioweapons, ones that spread silently, swiftly, before killing with perfect lethality on command (and that can be made extraordinarily cheaply, affordable even for terrorist groups). Perhaps new kinds of nuclear weapons enable the size of nuclear arsenals to increase by orders of magnitude, with new delivery mechanisms that are undetectable. Perhaps mosquito-sized drones, each carrying a deadly poison, could be targeted to kill every member of an opposing nation. It’s hard to know what a century’s worth of technological progress would yield—but I am confident it would unfold appalling possibilities.
          - paragraph [ref=e291]:
            - text: Humanity barely evaded self-destruction during the Cold War. On the historical view, the greatest existential risk posed by AGI is that it will enable us to develop extraordinary new means of mass death. This time, these means could even proliferate to become accessible to rogue actors or terrorists (especially if, as on
            - link "the current" [ref=e292] [cursor=pointer]:
              - /url: https://situational-awareness.ai/lock-down-the-labs/
            - text: course, the superintelligence weights aren’t sufficiently protected, and can be directly stolen by North Korea, Iran, and co.).
          - paragraph [ref=e293]:
            - text: "North Korea already has a concerted bioweapons program: the US"
            - link "assesses" [ref=e294] [cursor=pointer]:
              - /url: https://www.state.gov/wp-content/uploads/2023/04/13APR23-FINAL-2023-Treaty-Compliance-Report-UNCLASSIFIED-UNSOURCED.pdf
            - text: that “North Korea has a dedicated, national level offensive program” to develop and produce bioweapons. It seems plausible that their primary constraint is how far their small circle of top scientists has been able to push the limits of (synthetic) biology. What happens when that constraint is removed, when they can use millions of superintelligences to accelerate their bioweapons R&D? For example, the US
            - link "assesses" [ref=e295] [cursor=pointer]:
              - /url: https://www.state.gov/wp-content/uploads/2023/04/13APR23-FINAL-2023-Treaty-Compliance-Report-UNCLASSIFIED-UNSOURCED.pdf
            - text: that North Korea currently has “limited ability” to genetically engineer biological products—what happens when that becomes unlimited? With what unholy new concoctions will they hold us hostage?
          - paragraph [ref=e296]:
            - text: Moreover, as discussed in the
            - link "superalignment section" [ref=e297] [cursor=pointer]:
              - /url: https://situational-awareness.ai/superalignment/
            - text: ", there will be extreme safety risks around and during the intelligence explosion—we will be faced with novel technical challenges to ensure we can reliably trust and control superhuman AI systems. This very well may require us to slow down at some critical moments, say, delaying by 6 months in the middle of the intelligence explosion to get additional assurances on safety, or using a large fraction of compute on alignment research rather than capabilities progress."
          - paragraph [ref=e298]:
            - text: "Some hope for some sort of international treaty on safety. This seems fanciful to me. The world where both the CCP and USG are AGI-pilled enough to take safety risk seriously is also the world in which both realize that international economic and military predominance is at stake, that being months behind on AGI could mean being permanently left behind. If the race is tight, any arms control equilibrium, at least in the early phase around superintelligence, seems extremely unstable. In short, ”breakout” is too easy: the incentive (and the fear that others will act on this incentive) to race ahead with an intelligence explosion, to reach superintelligence and the decisive advantage, too great."
            - button [ref=e300] [cursor=pointer]:
              - img [ref=e301]
              - img [ref=e303]
              - img [ref=e305]
            - text: At the very least, the odds we get something good-enough here seem slim. (How have those climate treaties gone? That seems like a dramatically easier problem compared to this.)
          - paragraph [ref=e307]:
            - text: The main—perhaps the only—hope we have is that an alliance of democracies has a healthy lead over adversarial powers. The United States must lead, and use that lead to enforce safety norms on the rest of the world. That’s the
            - link "path we took with nukes" [ref=e308] [cursor=pointer]:
              - /url: https://marginalrevolution.com/marginalrevolution/2023/04/the-nuclear-non-proliferation-treaty-and-existential-agi-risk.html
            - text: ", offering assistance on the peaceful uses of nuclear technology in exchange for an international nonproliferation regime (ultimately underwritten by American military power)—and it’s the only path that’s been shown to work."
          - paragraph [ref=e309]: "Perhaps most importantly, a healthy lead gives us room to maneuver: the ability to “cash in” parts of the lead, if necessary, to get safety right, for example by devoting extra work to alignment during the intelligence explosion."
          - paragraph [ref=e310]:
            - text: The safety challenges of superintelligence would become
            - emphasis [ref=e311]: extremely
            - text: difficult to manage if you are in a neck-and-neck arms race. A 2 year vs. a 2 month lead could easily make all the difference. If we have only a 2 month lead, we have no margin at all for safety. In fear of the CCP’s intelligence explosion, we’d almost certainly race, no holds barred, through our own intelligence explosion—barreling towards AI systems vastly smarter than humans in months, without any ability to slow down to get key decisions right, with all the risks of superintelligence going awry that implies. We’d face an extremely volatile situation, as we and the CCP rapidly developed extraordinary new military technology that repeatedly destabilized deterrence. If our secrets and weights
            - link "aren’t locked down" [ref=e312] [cursor=pointer]:
              - /url: https://situational-awareness.ai/lock-down-the-labs/
            - text: ", it might even mean a range of other rogue states are close as well, each of them using superintelligence to furnish their own new arsenal of super-WMDs. Even if we barely managed to inch out ahead, it would likely be a pyrrhic victory; the existential struggle would have brought the world to the brink of total self-destruction."
          - paragraph [ref=e313]:
            - text: Superintelligence looks very different if the democratic allies have a healthy lead, say 2 years.
            - button [ref=e315] [cursor=pointer]:
              - img [ref=e316]
              - img [ref=e318]
              - img [ref=e320]
            - text: That buys us the time necessary to navigate the unprecedented series of challenges we’ll face around and after superintelligence, and to stabilize the situation.
          - paragraph [ref=e322]:
            - text: If and when it becomes clear that the US will decisively win,
            - emphasis [ref=e323]: that’s
            - text: when we offer a deal to China and other adversaries. They’ll know they won’t win, and so they’ll know their only option is to come to the table; and we’d rather avoid a feverish standoff or last-ditch military attempts on their part to sabotage Western efforts. In exchange for guaranteeing noninterference in their affairs, and sharing the peaceful benefits of superintelligence, a regime of nonproliferation, safety norms, and a semblance of stability post-superintelligence can be born.
          - paragraph [ref=e324]:
            - text: In any case, as we go deeper into this struggle, we must not forget the threat of self-destruction. That we made it through the Cold War in one piece involved too much luck
            - button [ref=e326] [cursor=pointer]:
              - img [ref=e327]
              - img [ref=e329]
              - img [ref=e331]
            - text: —and the destruction could be a thousandfold more potent than what we faced then. A healthy lead by an American-led coalition of democracies—and a solemn exercise of this leadership to stabilize whatever volatile situation we find ourselves in—is probably the safest path to navigating past this precipice. But in the heat of the AGI race, we better not screw it up.
          - heading "Superintelligence is a matter of national security" [level=2] [ref=e333]:
            - strong [ref=e334]: Superintelligence is a matter of national security
          - paragraph [ref=e335]: "It is clear: AGI is an existential challenge for the national security of the United States. It’s time to start treating it as such."
          - paragraph [ref=e336]: Slowly, the USG is starting to move. The export controls on American chips are a huge deal, and were an incredibly prescient move at the time. But we have to get serious across the board.
          - paragraph [ref=e337]:
            - text: The US
            - emphasis [ref=e338]: has
            - text: a lead. We just have to keep it. And we’re screwing that up right now. Most of all, we must rapidly and radically
            - link "lock down the AI labs" [ref=e339] [cursor=pointer]:
              - /url: https://situational-awareness.ai/lock-down-the-labs/
            - text: ", before we leak key AGI breakthroughs in the next 12-24 months (or the AGI weights themselves). We must build the compute clusters in the US, not in dictatorships that offer easy money. And yes, American AI labs have a duty to work with the intelligence community and the military. America’s lead on AGI won’t secure peace and freedom by just building the best AI girlfriend apps. It’s not pretty—but we must build AI for American defense."
          - separator [ref=e340]
          - paragraph [ref=e341]:
            - text: We are already on course for the most combustive international situation in decades. Putin is on the march in Eastern Europe. The Middle East is on fire. The CCP views taking Taiwan as its destiny. Now add in the race to AGI. Add in a century’s worth of technological breakthroughs compressed into years post-superintelligence. It will be the one of most unstable international situations ever seen—and at least initially, the incentives for first-strikes will be tremendous.
            - button [ref=e343] [cursor=pointer]:
              - img [ref=e344]
              - img [ref=e346]
              - img [ref=e348]
          - paragraph [ref=e350]:
            - text: There’s already an eerie convergence of AGI timelines (~2027?) and Taiwan watchers’ Taiwan invasion timelines (
            - link "China ready to invade Taiwan by 2027?" [ref=e351] [cursor=pointer]:
              - /url: https://www.bloomberg.com/news/articles/2024-03-20/china-on-track-to-be-ready-for-taiwan-invasion-by-2027-us-says?embedded-checkout=true
            - text: )—a convergence that will surely only heighten as the world wakes up to AGI. (Imagine if in 1960, the vast majority of the world’s uranium deposits were somehow concentrated in Berlin!) It seems to me that there is a real chance that the AGI endgame plays out with the backdrop of world war. Then all bets are off.
          - paragraph [ref=e353]:
            - text: Next post in series

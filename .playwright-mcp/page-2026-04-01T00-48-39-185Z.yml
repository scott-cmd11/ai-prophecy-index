              - listitem [ref=e367]:
                - paragraph [ref=e368]:
                  - text: Similarly, Qwen hugging face code cites Mistral a lot, and it seems that Chinese LLM dependence on American open-source is an
                  - link "explicit worry" [ref=e369] [cursor=pointer]:
                    - /url: https://www.scmp.com/tech/big-tech/article/3255545/china-said-fall-short-matching-us-advances-ai-owing-many-challenges-theory-and-technologies
                  - text: that has made its way to the Chinese Premier.
                  - link "↩" [ref=e370] [cursor=pointer]:
                    - /url: "#note-2-140"
                    - img "↩" [ref=e371]
              - listitem [ref=e372]:
                - paragraph [ref=e373]:
                  - text: The Huawei Ascend 910B seems to
                  - link "cost around 120,000 yuan" [ref=e374] [cursor=pointer]:
                    - /url: https://www.reuters.com/technology/nvidia-cuts-china-prices-huawei-chip-fight-sources-say-2024-05-24/
                  - text: per card, or about $17k. This is
                  - link "produced on the SMIC 7nm" [ref=e375] [cursor=pointer]:
                    - /url: https://www.semianalysis.com/p/nvidias-new-china-ai-chips-circumvent
                  - text: node, while performing similarly to an A100. H100s are maybe ~3x better than A100s, while costing somewhat more ($20-25k ASP), suggesting only a ~2-3x cost increase for equivalent AI GPU performance for China right now.
                  - link "↩" [ref=e376] [cursor=pointer]:
                    - /url: "#note-3-140"
                    - img "↩" [ref=e377]
              - listitem [ref=e378]:
                - paragraph [ref=e379]:
                  - text: For example, they’re still using Western HBM memory (which for some reason is not export controlled?), though
                  - link "CXMT is said to be sampling HBM" [ref=e380] [cursor=pointer]:
                    - /url: https://www.semianalysis.com/p/nvidias-new-china-ai-chips-circumvent
                  - text: next year.
                  - link "↩" [ref=e381] [cursor=pointer]:
                    - /url: "#note-4-140"
                    - img "↩" [ref=e382]
              - listitem [ref=e383]:
                - paragraph [ref=e384]:
                  - text: Though, since they can still import other types of chips from the West, they could simply direct the entirety of their 7nm node to AI chips, making up for lower overall production.
                  - link "↩" [ref=e385] [cursor=pointer]:
                    - /url: "#note-5-140"
                    - img "↩" [ref=e386]
              - listitem [ref=e387]:
                - paragraph [ref=e388]:
                  - text: Notably, even cybercriminals were able to
                  - link "hack Nvidia" [ref=e389] [cursor=pointer]:
                    - /url: https://www.bloomberg.com/news/articles/2022-03-01/nvidia-says-hackers-stole-data-from-network-and-posted-it-online?sref=o4HC3q1q
                  - text: and get
                  - link "key GPU design" [ref=e390] [cursor=pointer]:
                    - /url: https://www.semianalysis.com/p/nvidia-hacked-a-national-security?s=r
                  - text: secrets. Moreover,
                  - link "TPUv6 designs were apparently among what was stolen" [ref=e391] [cursor=pointer]:
                    - /url: https://deliprao.substack.com/p/google-tpu-v6-designs-are-probably
                  - text: by the recently-indicted Chinese national at Google.
                  - link "↩" [ref=e392] [cursor=pointer]:
                    - /url: "#note-6-140"
                    - img "↩" [ref=e393]
              - listitem [ref=e394]:
                - paragraph [ref=e395]:
                  - text: For example, maybe these are 2x worse on perf/$ or perf/Watt. In turn, that also means to achieve the same overall datacenter performance, you need more power, and need more chips networked together, which also makes things more of a hassle.
                  - link "↩" [ref=e396] [cursor=pointer]:
                    - /url: "#note-7-140"
                    - img "↩" [ref=e397]
              - listitem [ref=e398]:
                - paragraph [ref=e399]:
                  - text: Note that even 3x more on chips would be much less than that in terms of increase in datacenter costs. Actual logic fab costs are <5% of Nvidia GPU cost, and even considering memory and CoWoS it’s less than 20% of the Nvidia pricetag due to their margin. And even GPUs themselves tend to be only 50-60% of the cost of a datacenter. So 3x more expensive on the chip fab end might translate into much, much less than a 3x increase in overall cost. Even for 10x more expensive chips, it seems like China could stomach that without hugely increasing datacenter costs.
                  - link "↩" [ref=e400] [cursor=pointer]:
                    - /url: "#note-8-140"
                    - img "↩" [ref=e401]
              - listitem [ref=e402]:
                - paragraph [ref=e403]:
                  - text: Some argue that even if China stole these secrets, they wouldn’t be able to compete because it requires tacit knowledge. I disagree. I think of this as having two layers. The bottom layer is the engineering prowess for large-scale training runs; these training runs can be hacky and delicate and requires tacit knowledge. But as
                  - link "I’ll discuss later" [ref=e404] [cursor=pointer]:
                    - /url: https://docs.google.com/document/d/1rWU00M9JGybX_EtYoKxAwXnoMbxhQv1v0vaCWRNc5iw/edit#bookmark=id.vyfc2cj0wo1f
                  - text: ", Chinese AI efforts have shown themselves perfectly capable of training large-scale models, and I think they will have this tacit knowledge indigenously. The top layer is the algorithmic recipe—things like model architecture, the right scaling laws, etc.—that could be conveyed in a one-hour call. These compute multipliers are usually discrete changes, meaning the underlying tacit knowledge for large-scale training runs should transfer. I don’t think “tacit knowledge” will be a decisive barrier for Chinese AGI efforts."
                  - link "↩" [ref=e405] [cursor=pointer]:
                    - /url: "#note-9-140"
                    - img "↩" [ref=e406]
              - listitem [ref=e407]:
                - paragraph [ref=e408]:
                  - text: (Primarily monarchy.)
                  - link "↩" [ref=e409] [cursor=pointer]:
                    - /url: "#note-10-140"
                    - img "↩" [ref=e410]
              - listitem [ref=e411]:
                - paragraph [ref=e412]: Consider the following comparison of unstable vs. stable arms control equilibria. 1980s arms control during the Cold War reduced nuclear weapons substantially, but targeted a stable equilibrium. The US and the Soviet Union still had 1000s of nuclear weapons. MAD was assured, even if one of the actors tried a crash program to build more nukes; and a rogue nation could try to build some nukes of their own, but not fundamentally threaten the US or Soviet Union with overmatch.
                - paragraph [ref=e413]:
                  - text: However, when disarmament is to very low levels of weapons or occurs amidst rapid technological change, the equilibrium is unstable. A rogue actor or treaty-breaker can easily start a crash program and threaten to totally overmatch the other players. Zero nukes wouldn’t be a stable equilibrium; similarly,
                  - link "this paper" [ref=e414] [cursor=pointer]:
                    - /url: https://www.tandfonline.com/doi/abs/10.1080/01636608709477602?journalCode=rwaq20&ref=forourposterity.com
                  - text: has interesting historical case studies (such as post-WWI arms limitations and the Washington Naval Treaty) where disarmament in similarly dynamic situations destabilized, rather than stabilized.
                - paragraph [ref=e415]:
                  - text: If mere months of lead on AGI would give an utterly decisive advantage, this makes stable disarmament on AI similarly difficult. A rogue upstart or a treaty-breaker could gain a huge edge by secretly starting a crash program; the temptation would be too great for any sort of arrangement to be stable.
                  - link "↩" [ref=e416] [cursor=pointer]:
                    - /url: "#note-11-140"
                    - img "↩" [ref=e417]
              - listitem [ref=e418]:
                - paragraph [ref=e419]:
                  - text: It’s worth appreciating just how a big a deal 2 years is in terms of difference in AI capabilities. Given the already-rapid pace of AI progress today, and the even-more-rapid pace we should expect in an
                  - link "intelligence explosion" [ref=e420] [cursor=pointer]:
                    - /url: https://docs.google.com/document/d/1rWU00M9JGybX_EtYoKxAwXnoMbxhQv1v0vaCWRNc5iw/edit#bookmark=id.syrji3eimr65
                  - text: ", and the broader technological explosion post-superintelligence, a “even” a 2-year-lead would mean vast differences in capability."
                  - link "↩" [ref=e421] [cursor=pointer]:
                    - /url: "#note-12-140"
                    - img "↩" [ref=e422]
              - listitem [ref=e423]:
                - paragraph [ref=e424]:
                  - text: Daniel Ellsberg
                  - link "recounts this rivetingly" [ref=e425] [cursor=pointer]:
                    - /url: https://www.amazon.com/Doomsday-Machine-Confessions-Nuclear-Planner/dp/1608196704
                  - text: ", as one of the nuclear war planners at RAND and in the national security apparatus at the time."
                  - link "↩" [ref=e426] [cursor=pointer]:
                    - /url: "#note-13-140"
                    - img "↩" [ref=e427]
              - listitem [ref=e428]:
                - paragraph [ref=e429]:
                  - text: Everyone will be racing to their own superintelligences, and there will be a limited window before someone ahead will have irreversibly pulled away. There will be a big incentive to try to disable the enemy superintelligence clusters before they’ve gained a sufficient physical advantage (e.g., using superintelligence to develop impenetrable missile defense or drone swarms) that leaves everyone else permanently in the dust.
                  - link "↩" [ref=e430] [cursor=pointer]:
                    - /url: "#note-14-140"
                    - img "↩" [ref=e431]
    - contentinfo [ref=e432]
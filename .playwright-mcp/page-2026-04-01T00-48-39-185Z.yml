          - separator [ref=e85]
          - blockquote [ref=e87]:
            - paragraph [ref=e88]:
              - emphasis [ref=e89]: The story of the human race is War. Except for brief and precarious interludes, there has never been peace in the world; and before history began, murderous strife was universal and unending.
              - emphasis [ref=e90]: …
              - emphasis [ref=e91]: Might not a bomb no bigger than an orange be found to possess a secret power to destroy a whole block of buildings — nay, to concentrate the force of a thousand tons of cordite and blast a township at a stroke?
            - generic [ref=e92]: —Winston Churchill, “Shall We All Commit Suicide?”
          - paragraph [ref=e94]: Superintelligence will be the most powerful technology—and most powerful weapon—mankind has ever developed. It will give a decisive military advantage, perhaps comparable only with nuclear weapons. Authoritarians could use superintelligence for world conquest, and to enforce total control internally. Rogue states could use it to threaten annihilation. And though many count them out, once the CCP wakes up to AGI it has a clear path to being competitive (at least until and unless we drastically improve US AI lab security).
          - paragraph [ref=e95]: Every month of lead will matter for safety too. We face the greatest risks if we are locked in a tight race, democratic allies and authoritarian competitors each racing through the already-precarious intelligence explosion at breakneck pace—forced to throw any caution by the wayside, fearing the other getting superintelligence first. Only if we preserve a healthy lead of democratic allies will we have the margin of error for navigating the extraordinarily volatile and dangerous period around the emergence of superintelligence. And only American leadership is a realistic path to developing a nonproliferation regime to avert the risks of self-destruction superintelligence will unfold.
          - paragraph [ref=e96]: "Our generation too easily takes for granted that we live in peace and freedom. And those who herald the age of AGI in SF too often ignore the elephant in the room: superintelligence is a matter of national security, and the United States must win."
          - heading "Whoever leads on superintelligence will have a decisive military advantage" [level=2] [ref=e97]:
            - strong [ref=e98]: Whoever leads on superintelligence will have a decisive military advantage
          - paragraph [ref=e99]: Superintelligence is not just any other technology—hypersonic missiles, stealth, and so on—where US and liberal democracies’ leadership is highly desirable, but not strictly necessary. The military balance of power can be kept if the US falls behind on one or a couple such technologies; these technologies matter a great deal, but can be outweighed by advantages in other areas.
          - paragraph [ref=e100]: "The advent of superintelligence will put us in a situation unseen since the advent of the atomic era: those who have it will wield complete dominance over those who don’t."
          - paragraph [ref=e101]:
            - text: I’ve previously discussed the
            - link "vast power of superintelligence" [ref=e102] [cursor=pointer]:
              - /url: https://situational-awareness.ai/from-agi-to-superintelligence/#The_power_of_superintelligence
            - text: . It’ll mean having billions of automated scientists and engineers and technicians, each much smarter than the smartest human scientists, furiously inventing new technologies, day and night. The acceleration in scientific and technological development will be extraordinary. As superintelligence is applied to R&D in military technology, we could quickly go through decades of military technological progress.
          - generic [ref=e104]:
            - 'heading "The Gulf War, or: What a few-decades-worth of technological lead implies for military power" [level=4] [ref=e105]':
              - strong [ref=e106]: "The Gulf War, or: What a few-decades-worth of technological lead implies for military power"
            - paragraph [ref=e107]:
              - text: The Gulf War provides a helpful illustration of how a 20-30 year lead in military technology can be decisive. At the time, Iraq commanded the fourth-largest army in the world. In terms of
              - link "numbers" [ref=e108] [cursor=pointer]:
                - /url: https://www.youtube.com/watch?v=wKi3NwLFkX4
              - text: (troops, tanks, artillery), the US-led coalition barely matched (or was outmatched) by the Iraqis, all while the Iraqis had had ample time to entrench their defenses (a situation that would normally require a 3:1, or 5:1, advantage in military manpower to dislocate).
            - paragraph [ref=e109]:
              - text: But the US-led coalition
              - emphasis [ref=e110]: obliterated
              - text: the Iraqi army in a merely 100-hour ground war. Coalition dead
              - link "numbered" [ref=e111] [cursor=pointer]:
                - /url: https://en.wikipedia.org/wiki/Gulf_War
              - text: a mere 292, compared to 20k-50k Iraqi dead and hundreds of thousands of others wounded or captured. The Coalition lost a mere 31 tanks, compared to the destruction of over 3,000 Iraqi tanks.
            - paragraph [ref=e112]: "The difference in technology wasn’t godlike or unfathomable, but it was utterly and completely decisive: guided and smart munitions, early versions of stealth, better sensors, better tank scopes (to see farther in the night and in dust storms), better fighter jets, an advantage in reconnaissance, and so on."
            - paragraph [ref=e113]:
              - text: (For a more recent example, recall Iran launching a massive attack of 300 missiles at Israel, “
              - link "99%" [ref=e114] [cursor=pointer]:
                - /url: https://apnews.com/article/strait-of-hormuz-vessel-33fcffde2d867380e98c89403776a8ac
              - text: ” of which were intercepted by superior Israel, US, and allied missile defense.)
          - paragraph [ref=e115]:
            - text: A lead of a year or two or three on superintelligence could mean as
            - emphasis [ref=e116]: utterly decisive
            - text: a military advantage as the US coalition had against Iraq in the Gulf War. A complete reshaping of the military balance of power will be on the line.
          - paragraph [ref=e117]: Imagine if we had gone through the military technological developments of the 20th century in less than a decade. We’d have gone from horses and rifles and trenches, to modern tank armies, in a couple years; to armadas of supersonic fighter planes and nuclear weapons and ICBMs a couple years after that; to stealth and precision that can knock out an enemy before they even know you’re there another couple years after that.
          - paragraph [ref=e118]: "That is the situation we will face with the advent of superintelligence: the military technological advances of a century compressed to less than a decade. We’ll see superhuman hacking that can cripple much of an adversary’s military force, roboarmies and autonomous drone swarms, but more importantly completely new paradigms we can’t yet begin to imagine, and the inventions of new WMDs with thousandfold increases in destructive power (and new WMD defenses too, like impenetrable missile defense, that rapidly and repeatedly upend deterrence equilibria)."
          - paragraph [ref=e119]:
            - text: And it wouldn’t just be technological progress. As we solve
            - link "robotics" [ref=e120] [cursor=pointer]:
              - /url: https://situational-awareness.ai/from-agi-to-superintelligence/#The_power_of_superintelligence
            - text: ", labor will become fully automated, enabling a broader industrial and"
            - link "economic explosion" [ref=e121] [cursor=pointer]:
              - /url: https://www.openphilanthropy.org/research/could-advanced-ai-drive-explosive-economic-growth/
            - text: ", too. It is plausible growth rates could go into the 10s of percent a year; within at most a decade, the GDP of those with the lead would trounce those behind. Rapidly multiplying robot factories would mean not only a drastic technological edge, but also production capacity to dominate in pure materiel. Think millions of missile interceptors; billions of drones; and so on."
          - paragraph [ref=e122]:
            - text: Of course, we don’t know the limits of science and the many frictions that could slow things down. But no godlike advances are necessary for a decisive military advantage. And a billion superintelligent scientists will be able to do
            - emphasis [ref=e123]: a lot. It seems clear that within a matter of years, pre-superintelligence militaries would become hopelessly outclassed
            - text: .
          - generic [ref=e125]:
            - heading "The military advantage would be decisive even against nuclear deterrents" [level=4] [ref=e126]:
              - strong [ref=e127]: The military advantage would be decisive even against nuclear deterrents
            - paragraph [ref=e128]:
              - text: "To be even clearer: it seems likely the advantage conferred by superintelligence would be decisive enough even to preemptively take out an adversary’s nuclear deterrent. Improved sensor networks and analysis could locate even the quietest current nuclear submarines (similarly for mobile missile launchers). Millions or billions of mouse-sized autonomous drones, with advances in stealth, could infiltrate behind enemy lines and then surreptitiously locate, sabotage, and decapitate the adversary’s nuclear forces. Improved sensors, targeting, and so on could dramatically improve missile defense (similar to, say, the Iran vs. Israel example above); moreover, if there is an industrial explosion, robot factories could churn out thousands of interceptors for each opposing missile. And all of this is without even considering completely new scientific and technological paradigms (e.g.,"
              - link "remotely deactivating" [ref=e129] [cursor=pointer]:
                - /url: https://twitter.com/toughsf/status/1754550452996518099?s=46
              - text: all the nukes).
            - paragraph [ref=e130]: It would simply be no contest. And not just no contest in the nuclear sense of “we could mutually destroy each other,” but no contest in terms of being able to obliterate the military power of a rival without taking significant casualties. A couple years of lead on superintelligence would mean complete dominance.
          - paragraph [ref=e131]:
            - text: If there is a rapid
            - link "intelligence explosion" [ref=e132] [cursor=pointer]:
              - /url: https://situational-awareness.ai/from-agi-to-superintelligence/
            - text: ", it’s plausible a lead of mere"
            - emphasis [ref=e133]: months
            - text: "could be decisive: months could mean the difference between roughly human-level AI systems and substantially superhuman AI systems. Perhaps possessing those initial superintelligences alone, even before being broadly deployed, would be enough for a decisive advantage, e.g. via superhuman hacking abilities that could shut down pre-superintelligence militaries, more limited drone swarms that threaten instant death for every opposing leader, official, and their families, and advanced bioweapons developed with AlphaFold-style simulation that could target specific ethnic groups, e.g. anybody but Han Chinese (or simply withhold the cure from the adversary)."

              - listitem [ref=e469]:
                - paragraph [ref=e470]:
                  - text: Why isn’t “factorio-world”—build a factory, that produces more factories, producing even more factories, doubling factories until eventually your entire planet is quickly covered in factories—possible today? Well, labor is constrained—you can accumulate capital (factories, tools, etc.), but that runs into diminishing returns because it’s constrained by a fixed labor force. With robots and AI systems being able to fully automate labor, that removes that constraint; robo-factories could produce more robo-factories in an ~unconstrained way, leading to an industrial explosion. See more economic growth models of this
                  - link "here" [ref=e471] [cursor=pointer]:
                    - /url: https://www.nber.org/papers/w31815
                  - text: .
                  - link "↩" [ref=e472] [cursor=pointer]:

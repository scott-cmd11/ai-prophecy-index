          - paragraph [ref=e159]:
            - text: Another way of thinking about it is that
            - emphasis [ref=e160]: given inference fleets in 2027, we should be able to generate an entire internet’s worth of tokens, every single day.
            - button [ref=e162] [cursor=pointer]:
              - img [ref=e163]

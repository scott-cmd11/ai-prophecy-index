          - list [ref=e364]:
            - listitem [ref=e365]:
              - emphasis [ref=e366]:
                - strong [ref=e367]: Provide a decisive and overwhelming military advantage.
              - text: Even early cognitive superintelligence might be enough here; perhaps some superhuman hacking scheme can deactivate adversary militaries. In any case, military power and technological progress has been tightly linked historically, and with extraordinarily rapid technological progress will come concomitant military revolutions. The drone swarms and roboarmies will be a big deal, but they are just the beginning; we should expect completely new kinds of weapons, from novel WMDs to invulnerable laser-based missile defense to things we can’t yet fathom. Compared to pre-superintelligence arsenals, it’ll be like 21st century militaries fighting a 19th century brigade of horses and bayonets. (I discuss how superintelligence could lead to a decisive military advantage in a
              - link "later piece" [ref=e368] [cursor=pointer]:
                - /url: https://situational-awareness.ai/the-free-world-must-prevail/
              - text: .)
            - listitem [ref=e369]:
              - emphasis [ref=e370]:
                - strong [ref=e371]: Be able to overthrow the US government.
              - text: Whoever controls superintelligence will quite possibly have enough power to seize control from pre-superintelligence forces. Even without robots, the small civilization of superintelligences would be able to hack any undefended military, election, television, etc. system, cunningly persuade generals and electorates, economically outcompete nation-states, design new synthetic bioweapons and then pay a human in bitcoin to synthesize it, and so on. In the
              - link "early 1500s" [ref=e372] [cursor=pointer]:
                - /url: https://www.lesswrong.com/posts/ivpKSjM4D6FbqF4pZ/cortes-pizarro-and-afonso-as-precedents-for-takeover
              - text: ", Cortes and about 500 Spaniards conquered the Aztec empire of several million; Pizarro and ~300 Spaniards conquered the Inca empire of several million; Alfonso and ~1000 Portuguese conquered the Indian Ocean. They didn’t have god-like power, but the Old World’s technological edge and an advantage in strategic and diplomatic cunning led to an utterly decisive advantage. Superintelligence might look similar."
          - heading " Robots" [level=3] [ref=e376]:
            - link " Robots" [ref=e377] [cursor=pointer]:
              - /url: javascript:void(0)
              - generic [ref=e378]: 
              - text: Robots
          - figure "Explosive growth starts in the narrower domain of AI R&D; as we apply superintelligence to R&D in other fields, explosive growth will broaden." [ref=e380]:
            - emphasis [ref=e382]: Explosive growth starts in the narrower domain of AI R&D; as we apply superintelligence to R&D in other fields, explosive growth will broaden.
          - separator [ref=e383]
          - paragraph [ref=e384]: "How all of this plays out over the 2030s is hard to predict (and a story for another time). But one thing, at least, is clear: we will be rapidly plunged into the most extreme situation humanity has ever faced."
          - paragraph [ref=e385]:
            - text: Human-level AI systems, AGI, would be highly consequential in their own right—but in some sense, they would simply be a more efficient version of what we already know. But, very plausibly, within just a year, we would transition to much more alien systems, systems whose understanding and abilities—whose raw power—would exceed those even of humanity combined. There is a real possibility that we will
            - link "lose control" [ref=e386] [cursor=pointer]:
              - /url: https://situational-awareness.ai/superalignment/
            - text: ", as we are forced to hand off trust to AI systems during this rapid transition."
          - paragraph [ref=e387]:
            - text: More generally, everything will just start happening
            - emphasis [ref=e388]: incredibly fast
            - text: . And the world will start going insane. Suppose we had gone through the geopolitical fever-pitches and man-made perils of the 20th century in mere years; that is the sort of situation we should expect post-superintelligence. By the end of it, superintelligent AI systems will be running our military and economy. During all of this insanity, we’d have extremely scarce time to make the right decisions. The challenges will be immense. It will take everything we’ve got to make it through in one piece.
          - paragraph [ref=e389]:
            - emphasis [ref=e390]:
              - strong [ref=e391]: The intelligence explosion and the immediate post-superintelligence period will be one of the most volatile, tense, dangerous, and wildest periods ever in human history.
          - paragraph [ref=e392]: And by the end of the decade, we’ll likely be in the midst of it.
          - separator [ref=e393]
          - paragraph [ref=e394]:
            - text: Confronting the possibility of an intelligence explosion—the emergence of superintelligence—often echoes the
            - link "early debates" [ref=e395] [cursor=pointer]:
              - /url: https://www.amazon.com/Making-Atomic-Bomb-Richard-Rhodes/dp/1451677618
            - text: around the possibility of a nuclear chain reaction—and the atomic bomb it would enable. HG Wells predicted the atomic bomb in a 1914 novel. When Szilard first conceived of the idea of a chain reaction in 1933, he couldn’t convince anyone of it; it was pure theory. Once fission was empirically discovered in 1938, Szilard freaked out again and argued strongly for secrecy, and a few people started to wake up to the possibility of a bomb. Einstein hadn’t considered the possibility of a chain reaction, but when Szilard confronted him, he was quick to see the implications and willing to do anything that was needed to be done; he was willing to sound the alarm, and wasn’t afraid of sounding foolish. But Fermi, Bohr, and most scientists thought the “conservative” thing was to play it down, rather than take seriously the extraordinary implications of the possibility of a bomb. Secrecy (to avoid sharing their advances with the Germans) and other all-out efforts seemed absurd to them. A chain reaction sounded too crazy. (Even when, as it turned out, a bomb was but half a decade from becoming reality.)
          - paragraph [ref=e396]:
            - text: We must once again confront the possibility of a chain reaction. Perhaps it sounds speculative to you. But among senior scientists at AI labs, many see a rapid intelligence explosion as strikingly plausible. They can
            - emphasis [ref=e397]: see
            - text: it. Superintelligence is possible.
          - paragraph [ref=e399]:
            - text: "Next post in series:"
            - emphasis [ref=e400]:
              - link "III. The Challenges – IIIa. Racing to the Trillion-Dollar Cluster" [ref=e401] [cursor=pointer]:
                - /url: https://situational-awareness.ai/racing-to-the-trillion-dollar-cluster/
                - strong [ref=e402]: III. The Challenges – IIIa. Racing to the Trillion-Dollar Cluster
          - generic [ref=e404]:
            - separator [ref=e405]
            - list [ref=e406]:
              - listitem [ref=e407]:
                - paragraph [ref=e408]:
                  - text: And much of the Cold War’s perversities (cf
                  - link "Daniel Ellsberg’s book" [ref=e409] [cursor=pointer]:
                    - /url: https://www.amazon.com/Doomsday-Machine-Confessions-Nuclear-Planner/dp/1608196704
                  - text: ) stemmed from merely replacing A-bombs with H-bombs, without adjusting nuclear policy and war plans to the massive capability increase.
                  - link "↩" [ref=e410] [cursor=pointer]:
                    - /url: "#note-1-71"
                    - img "↩" [ref=e411]
              - listitem [ref=e412]:
                - paragraph [ref=e413]:
                  - text: The job of an AI researcher is also a job that AI researchers at AI labs just, well, know really well—so it’ll be particularly intuitive to them to optimize models to be good at that job. And there will be huge incentives to do so to help them accelerate their research and their labs’ competitive edge.
                  - link "↩" [ref=e414] [cursor=pointer]:
                    - /url: "#note-2-71"
                    - img "↩" [ref=e415]
              - listitem [ref=e416]:
                - paragraph [ref=e417]:
                  - text: This suggests an important point in terms of the sequencing of risks from AI, by the way. A common AI threat model people point to is AI systems developing novel bioweapons, and that posing catastrophic risk. But if AI research is more straightforward to automate than biology R&D, we might get an intelligence explosion before we get extreme AI biothreats. This matters, for example, with regard to whether we should expect “bio warning shots” in time before things get crazy on AI.
                  - link "↩" [ref=e418] [cursor=pointer]:
                    - /url: "#note-3-71"
                    - img "↩" [ref=e419]
              - listitem [ref=e420]:
                - paragraph [ref=e421]:
                  - link "As noted earlier" [ref=e422] [cursor=pointer]:
                    - /url: https://situational-awareness.ai/from-gpt-4-to-agi/#Algorithmic_efficiencies
                  - text: ", the GPT-4 API costs less today than GPT-3 when it was released—this suggests that the trend of inference efficiency wins is fast enough to keep inference costs roughly constant even as models get much more powerful. Similarly, there have been huge"
                  - link "inference cost wins" [ref=e423] [cursor=pointer]:
                    - /url: https://situational-awareness.ai/from-gpt-4-to-agi/#Algorithmic_efficiencies
                  - text: in just the year since GPT-4 was released; for example,
                  - link "the current version of Gemini 1.5 Pro" [ref=e424] [cursor=pointer]:
                    - /url: https://ai.google.dev/pricing
                  - text: outperforms the original GPT-4, while being
                  - link "roughly 10x cheaper" [ref=e425] [cursor=pointer]:
                    - /url: https://ai.google.dev/pricing
                  - text: .
                - paragraph [ref=e426]:
                  - text: We can also ground this somewhat more by considering Chinchilla scaling laws. On Chinchilla scaling laws, model size—and thus inference costs—grow with the square root of training cost, i.e. half the OOMs of the OOM scaleup of effective compute. However, in the
                  - link "previous piece" [ref=e427] [cursor=pointer]:
                    - /url: https://situational-awareness.ai/from-gpt-4-to-agi
                  - text: ", I suggested that algorithmic efficiency was advancing at roughly the same pace as compute scaleup, i.e. it made up roughly half of the OOMs of effective compute scaleup. If these algorithmic wins also translate into inference efficiency, that means that the algorithmic efficiencies would compensate for the naive increase in inference cost."
                - paragraph [ref=e428]: In practice, training compute efficiencies often, but not always, translate into inference efficiency wins. However, there are also separately many inference efficiency wins that are not training efficiency wins. So, at least in terms of the rough ballpark, assuming the $/token of frontier models stays roughly similar doesn’t seem crazy.
                - paragraph [ref=e429]:
                  - text: (Of course, they’ll use more tokens, i.e. more test-time compute. But that’s already part of the calculation here, by pricing human-equivalents as 100 tokens/minute.)
                  - link "↩" [ref=e430] [cursor=pointer]:
                    - /url: "#note-4-71"
                    - img "↩" [ref=e431]
              - listitem [ref=e432]:
                - paragraph [ref=e433]:
                  - text: GPT-4 Turbo
                  - link "is about" [ref=e434] [cursor=pointer]:
                    - /url: https://openai.com/api/pricing/
                  - text: $0.03/1K tokens. We supposed we would have 10s of millions of A100 equivalents, which cost ~$1 hour per GPU if A100-equivalents. If we used the API costs to translate GPUs into tokens generated, that implies 10s of millions GPUs * $1/GPU-hour * 33K tokens/$ = ~ one trillion tokens/ hour. Suppose a human does 100 tokens/min of thinking, that means a human-equivalent is 6,000 tokens/hour. One trillion tokens/hour divided by 6,000 tokens/human-hour = ~200 million human-equivalents—i.e. as if running 200 million human researchers, day and night. (And even if we reserve half the GPUs for experiment compute, we get 100 million human-researcher-equivalents.)
                  - link "↩" [ref=e435] [cursor=pointer]:
                    - /url: "#note-5-71"
                    - img "↩" [ref=e436]
              - listitem [ref=e437]:
                - paragraph [ref=e438]:
                  - text: The previous footnote estimated ~1T tokens/hour, i.e. 24T tokens a day. In the
                  - link "previous piece," [ref=e439] [cursor=pointer]:
                    - /url: https://situational-awareness.ai/from-gpt-4-to-agi/
                  - text: I noted that a
                  - link "public deduplicated CommonCrawl had around 30T tokens" [ref=e440] [cursor=pointer]:

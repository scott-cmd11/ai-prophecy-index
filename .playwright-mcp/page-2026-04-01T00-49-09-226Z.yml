              - listitem [ref=e462]:
                - paragraph [ref=e463]:
                  - text: The 10x speed robots doing physical R&D in the real world is the “slow version”; in reality the superintelligences will try to do as much R&D as possible in simulation, like
                  - link "AlphaFold" [ref=e464] [cursor=pointer]:

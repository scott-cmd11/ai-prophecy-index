            - text: In any case, the exact numbers don’t matter that much, beyond a simple plausibility demonstration.
          - paragraph [ref=e169]: "Moreover, our automated AI researchers may soon be able to run at much faster than human-speed:"
          - list [ref=e170]:
            - listitem [ref=e171]:
              - text: By taking some inference penalties, we can trade off running fewer copies in exchange for running them at faster serial speed. (For example, we could go from ~5x human speed to ~100x human speed by “only” running 1 million copies of the automated researchers.
              - button [ref=e173] [cursor=pointer]:
                - img [ref=e174]

                  - text: .
                  - link "↩" [ref=e441] [cursor=pointer]:
                    - /url: "#note-6-71"
                    - img "↩" [ref=e442]
              - listitem [ref=e443]:
                - paragraph [ref=e444]:
                  - text: Jacob Steinhardt estimates that k^3 parallel copies of a model can be replaced with a single model that is k^2 faster, given
                  - link "some math on inference tradeoffs" [ref=e445] [cursor=pointer]:
                    - /url: https://bounded-regret.ghost.io/how-fast-can-we-perform-a-forward-pass/
                  - text: with a tiling scheme (that theoretically works even for k of 100 or more). Suppose initial speeds were already ~5x human speed (based on, say, GPT-4 speed on release). Then, by taking this inference penalty (with k= ~5), we’d be able to run ~1 million automated AI researchers at ~100x human speed.
                  - link "↩" [ref=e446] [cursor=pointer]:
                    - /url: "#note-7-71"
                    - img "↩" [ref=e447]
              - listitem [ref=e448]:
                - paragraph [ref=e449]:
                  - text: This
                  - link "source" [ref=e450] [cursor=pointer]:
                    - /url: https://artificialanalysis.ai/models/gemini-1-5-flash
                  - text: benchmarks throughput of Flash at ~6x GPT-4 Turbo, and GPT-4 Turbo was faster than original GPT-4. Latency is probably also roughly 10x faster.
                  - link "↩" [ref=e451] [cursor=pointer]:
                    - /url: "#note-8-71"
                    - img "↩" [ref=e452]
              - listitem [ref=e453]:
                - paragraph [ref=e454]:
                  - text: Alec Radford is an incredibly gifted and prolific researcher/engineer at OpenAI, behind
                  - link "many of the most important advances" [ref=e455] [cursor=pointer]:
                    - /url: https://www.olin.edu/sites/default/files/2023-06/How%20a%20couple%20of%20Olin%20College%20students%20h...%20chatbot%20revolution%20-%20The%20Boston%20Globe.pdf
                  - text: ", though he flies under the radar some."

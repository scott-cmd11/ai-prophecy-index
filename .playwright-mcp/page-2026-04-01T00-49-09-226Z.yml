            - emphasis [ref=e275]: by the end of this decade
            - text: will be unimaginably powerful.
          - list [ref=e276]:
            - listitem [ref=e277]:
              - text: Of course, they’ll be
              - emphasis [ref=e278]: quantitatively
              - text: superhuman. On our fleets of
              - link "100s of millions of GPUs by the end of the decade" [ref=e279] [cursor=pointer]:
                - /url: https://situational-awareness.ai/racing-to-the-trillion-dollar-cluster/
              - text: ", we’ll be able to run a civilization of billions of them, and they will be able to “think” orders of magnitude faster than humans. They’ll be able to quickly master any domain, write trillions of lines of code, read every research paper in every scientific field ever written (they’ll be perfectly interdisciplinary!) and write new ones before you’ve gotten past the abstract of one, learn from the parallel experience of every one of its of copies, gain billions of human-equivalent years of experience with some new innovation in a matter of weeks, work 100% of the time with peak energy and focus and won’t be slowed down by that one teammate who is lagging, and so on."
            - listitem [ref=e280]:
              - text: More importantly—but harder to imagine—they’ll be
              - emphasis [ref=e281]: qualitatively
              - text: superhuman. As a narrow example of this, large-scale RL runs have been able to produce completely novel and creative behaviors beyond human understanding, such as the
              - link "famous move 37 in AlphaGo vs. Lee Sedol" [ref=e282] [cursor=pointer]:
                - /url: https://www.wired.com/2016/03/two-moves-alphago-lee-sedol-redefined-future/
              - text: . Superintelligence will be this across many domains. It’ll find exploits in the human code too subtle for any human to notice, and it’ll generate code too complicated for any human to understand even if the model spent decades trying to explain it. Extremely difficult scientific and technological problems that a human would be stuck on for decades will seem just
              - emphasis [ref=e283]: so obvious
              - text: to them. We’ll be like high-schoolers stuck on Newtonian physics while it’s off exploring quantum mechanics.
          - paragraph [ref=e284]:
            - text: As a visualization of how
            - emphasis [ref=e285]: wild
            - text: this could be, look at some Youtube videos of video game speedruns, such as this one of
            - link "beating Minecraft in 20 seconds" [ref=e286] [cursor=pointer]:
              - /url: https://www.youtube.com/watch?v=do08uW0N5Qs
            - text: .
          - figure "Beating Minecraft in 20 seconds. (If you have no idea what’s going on in this video, you’re in good company; even most normal players of Minecraft have almost no clue what’s going on.)" [ref=e288]:
            - generic [ref=e289]: Beating Minecraft in 20 seconds. (If you have no idea what’s going on in this video, you’re in good company; even most normal players of Minecraft have almost no clue what’s going on.)
          - paragraph [ref=e290]: Now imagine this applied to all domains of science, technology, and the economy. The error bars here, of course, are extremely large. Still, it’s important to consider just how consequential this would be.
          - figure "What does it feel like to stand here? Illustration from Wait But Why/Tim Urban." [ref=e292]:
            - generic [ref=e293]:
              - text: What does it feel like to stand here? Illustration from
              - link "Wait But Why/Tim Urban" [ref=e294] [cursor=pointer]:
                - /url: https://waitbutwhy.com/2015/01/artificial-intelligence-revolution-1.html
              - text: .
          - paragraph [ref=e295]: "In the intelligence explosion, explosive progress was initially only in the narrow domain of automated AI research. As we get superintelligence, and apply our billions of (now superintelligent) agents to R&D across many fields, I expect explosive progress to broaden:"
          - list [ref=e296]:
            - listitem [ref=e297]:
              - emphasis [ref=e298]:
                - strong [ref=e299]: An AI capabilities explosion.
              - text: Perhaps our initial AGIs had limitations that prevented them fully automating work in some other domains (rather than just in the AI research domain); automated AI research will quickly solve these, enabling automation of any and all cognitive work.
            - listitem [ref=e300]:
              - emphasis [ref=e301]:
                - strong [ref=e302]: Solve robotics.
              - text: Superintelligence won’t stay purely cognitive for long. Getting robotics to work well is primarily an ML algorithms problem (rather than a hardware problem), and our automated AI researchers will likely be able to solve it (more below). Factories would go from human-run, to AI-directed using human physical labor, to soon being fully run by swarms of robots.
            - listitem [ref=e303]:
              - emphasis [ref=e304]:
                - strong [ref=e305]: Dramatically accelerate scientific and technological progress.
              - text: Yes, Einstein alone couldn’t develop neuroscience and build a semiconductor industry, but a billion superintelligent automated scientists, engineers, technologists, and robot technicians (with the robots moving at 10x or more human speed!)
              - button [ref=e307] [cursor=pointer]:
                - img [ref=e308]
                - img [ref=e310]
                - img [ref=e312]
              - text: would make extraordinary advances in many fields in the space of years. (Here’s a nice
              - link "short story" [ref=e314] [cursor=pointer]:
                - /url: https://www.asimov.press/p/tinker
              - text: visualizing what AI-driven R&D might look like.) The billion superintelligences would be able to compress the R&D effort humans researchers would have done in the next century into years. Imagine if the technological progress of the 20th century were compressed into less than a decade. We would have gone from flying being thought a mirage, to airplanes, to a man on the moon and ICBMs in a matter of years.
              - emphasis [ref=e315]: This is what I expect the 2030s to look like across science and technology.
            - listitem [ref=e316]:
              - emphasis [ref=e317]:
                - strong [ref=e318]: An industrial and economic explosion.
              - text: "Extremely accelerated technological progress, combined with the ability to automate all human labor, could dramatically accelerate economic growth (think: self-replicating robot factories quickly covering all of the Nevada desert)."
              - button [ref=e320] [cursor=pointer]:
                - img [ref=e321]
                - img [ref=e323]
                - img [ref=e325]
              - text: The increase in growth probably wouldn’t just be from 2%/year to 2.5%/year; rather, this would be a fundamental shift in the growth regime, more comparable to the historical step-change from very slow growth to a couple percent a year with the industrial revolution. We could see economic growth rates of 30%/year and beyond, quite possibly multiple doublings a year. This follows fairly straightforwardly from economists’
              - link "models" [ref=e327] [cursor=pointer]:
                - /url: https://globalprioritiesinstitute.org/philip-trammell-and-anton-korinek-economic-growth-under-transformative-ai/
              - text: of
              - link "economic" [ref=e328] [cursor=pointer]:
                - /url: https://www.openphilanthropy.org/research/could-advanced-ai-drive-explosive-economic-growth/
              - link "growth" [ref=e329] [cursor=pointer]:
                - /url: https://www.kellogg.northwestern.edu/faculty/research/researchdetail?guid=6d8928d1-2328-11e8-91be-0242ac160003
              - text: . To be sure, this may well be delayed by societal frictions; arcane regulation might ensure lawyers and doctors still need to be human, even if AI systems were much better at those jobs; surely sand will be thrown into the gears of rapidly expanding robo-factories as society resists the pace of change; and perhaps we’ll want to retain human nannies; all of which would slow the growth of the overall GDP statistics. Still, in whatever domains we remove human-created barriers (e.g., competition might force us to do so for military production), we’d see an industrial explosion.
          - 'figure "A shift in the growth regime is not unprecedented: as civilization went from hunting, to farming, to the blossoming of science and commerce, to industry, the pace of global economic growth accelerated. Superintelligence could kick off another shift in growth mode. Based on Robin Hanson’s “Long-run growth as a sequence of exponential modes”." [ref=e330]':

                - img [ref=e178]
              - text: )
            - listitem [ref=e180]:
              - text: More importantly, the first algorithmic innovation the automated AI researchers work on is getting a 10x or 100x speedup. Gemini 1.5 Flash is ~10x faster than the originally-released GPT-4,
              - button [ref=e182] [cursor=pointer]:
                - img [ref=e183]
                - img [ref=e185]
                - img [ref=e187]
              - text: merely a year later, while providing similar performance to the originally-released GPT-4 on reasoning benchmarks. If that’s the algorithmic speedup a few hundred human researchers can find in a year, the automated AI researchers will be able to find similar wins very quickly.
          - paragraph [ref=e189]:
            - emphasis [ref=e190]: "That is: expect 100 million automated researchers each working at 100x human speed not long after we begin to be able to automate AI research."
            - text: They’ll each be able to do a year’s worth of work in a few days. The increase in research effort—compared to a few hundred puny human researchers at a leading AI lab today, working at a puny 1x human speed—will be extraordinary.
          - paragraph [ref=e191]:
            - strong [ref=e192]: This could easily dramatically accelerate existing trends of algorithmic progress, compressing a decade of advances into a year.
            - text: We need not postulate anything totally novel for automated AI research to intensely speed up AI progress. Walking through the numbers in the
            - link "previous piece" [ref=e193] [cursor=pointer]:
              - /url: https://situational-awareness.ai/from-gpt-4-to-agi
            - text: ", we saw that algorithmic progress has been a central driver of deep learning progress in the last decade; we noted a trendline of ~0.5 OOMs/year on algorithmic efficiencies alone, with additional large algorithmic gains from unhobbling on top. (I think the import of algorithmic progress has been underrated by many, and properly appreciating it is important for appreciating the possibility of an intelligence explosion.)"
          - paragraph [ref=e194]: Could our millions of automated AI researchers (soon working at 10x or 100x human speed) compress the algorithmic progress human researchers would have found in a decade into a year instead? That would be 5+ OOMs in a year.
          - paragraph [ref=e195]: "Don’t just imagine 100 million junior software engineer interns here (we’ll get those earlier, in the next couple years!). Real automated AI researchers will be very smart—and in addition to their raw quantitative advantage, automated AI researchers will have other enormous advantages over human researchers:"
          - list [ref=e196]:
            - listitem [ref=e197]: They’ll be able to read every single ML paper ever written, have been able to deeply think about every single previous experiment ever run at the lab, learn in parallel from each of their copies, and rapidly accumulate the equivalent of millennia of experience. They’ll be able to develop far deeper intuitions about ML than any human.
            - listitem [ref=e198]: They’ll be easily able to write millions of lines of complex code, keep the entire codebase in context, and spend human-decades (or more) checking and rechecking every line of code for bugs and optimizations. They’ll be superbly competent at all parts of the job.
            - listitem [ref=e199]: You won’t have to individually train up each automated AI researcher (indeed, training and onboarding 100 million new human hires would be difficult). Instead, you can just teach and onboard one of them—and then make replicas. (And you won’t have to worry about politicking, cultural acclimation, and so on, and they’ll work with peak energy and focus day and night.)
            - listitem [ref=e200]: Vast numbers of automated AI researchers will be able to share context (perhaps even accessing each others’ latent space and so on), enabling much more efficient collaboration and coordination compared to human researchers.
            - listitem [ref=e201]: And of course, however smart our initial automated AI researchers would be, we’d soon be able to make further OOM-jumps, producing even smarter models, even more capable at automated AI research.
          - paragraph [ref=e202]:
            - text: Imagine an automated Alec Radford—
            - emphasis [ref=e203]: imagine 100 million automated Alec Radfords.
            - button [ref=e205] [cursor=pointer]:
              - img [ref=e206]
              - img [ref=e208]
              - img [ref=e210]
            - text: I think just about every researcher at OpenAI would agree that if they had 10 Alec Radfords, let alone 100 or 1,000 or 1 million running at 10x or 100x human speed, they could very quickly solve very many of their problems. Even with various other bottlenecks (more in a moment), compressing a decade of algorithmic progress into a year as a result seems very plausible. (A 10x acceleration from a million times more research effort, which seems conservative if anything.)
          - paragraph [ref=e212]:
            - text: That would be 5+ OOMs right there. 5 OOMs of algorithmic wins would be a similar scaleup to what produced the
            - link "GPT-2-to-GPT-4 jump" [ref=e213] [cursor=pointer]:
              - /url: https://situational-awareness.ai/from-gpt-4-to-agi/
            - text: ", a capability jump from ~a preschooler to ~a smart high schooler. Imagine such a qualitative jump"
            - emphasis [ref=e214]: on top of
            - text: AGI,
            - emphasis [ref=e215]: on top of
            - text: Alec Radford.
          - paragraph [ref=e216]: It’s strikingly plausible we’d go from AGI to superintelligence very quickly, perhaps in less than one year.
          - heading "Possible bottlenecks" [level=2] [ref=e217]:
            - strong [ref=e218]: Possible bottlenecks
          - paragraph [ref=e219]:
            - text: While this basic story is surprisingly strong—and is supported by
            - link "thorough economic modeling work" [ref=e220] [cursor=pointer]:
              - /url: https://www.openphilanthropy.org/research/what-a-compute-centric-framework-says-about-takeoff-speeds/
            - text: —there are some real and plausible bottlenecks that will probably slow down an automated-AI-research intelligence explosion.
          - paragraph [ref=e221]: "I’ll give a summary here, and then discuss these in more detail in the optional sections below for those interested:"
          - list [ref=e222]:
            - listitem [ref=e223]:
              - strong [ref=e224]:
                - emphasis [ref=e225]: Limited compute
              - text: ": AI research doesn’t just take good ideas, thinking, or math—but running experiments to get empirical signal on your ideas. A million times more research effort via automated research labor won’t mean a million times faster progress, because compute will still be limited—and limited compute for experiments will be the bottleneck. Still, even if this won’t be a 1,000,000x speedup, I find it hard to imagine that the automated AI researchers couldn’t use the compute"
              - emphasis [ref=e226]: at least
              - text: "10x more effectively: they’ll be able to get incredible ML intuition (having internalized the whole ML literature and every previous experiment every run!) and centuries-equivalent of thinking-time to figure out exactly the right experiment to run, configure it optimally, and get the maximum value of information; they’ll be able to spend centuries-equivalent of engineer-time before running even tiny experiments to avoid bugs and get them right on the first try; they can make tradeoffs to economize on compute by focusing on the biggest wins; and they’ll be able to try tons of smaller-scale experiments (and given effective compute scaleups by then, “smaller-scale” means being able to train 100,000 GPT-4-level models in a year to try architecture breakthroughs). Some human researchers and engineers are able to produce 10x the progress as others, even with the same amount of compute—and this should apply even moreso to automated AI researchers. I do think this is the most important bottleneck, and I address it in more depth below."
            - listitem [ref=e227]:
              - strong [ref=e228]:
                - emphasis [ref=e229]: Complementarities/long tail
              - emphasis [ref=e230]: ":"
              - text: A classic lesson from economics (cf Baumol’s growth disease) is that if you can automate, say, 70% of something, you get some gains but quickly the remaining 30% become your bottleneck. For anything that falls short of full automation—say, really good copilots—human AI researchers would remain a major bottleneck, making the overall increase in the rate of algorithmic progress relatively small. Moreover, there’s likely some long tail of capabilities required for automating AI research—the last 10% of the job of an AI researcher might be particularly hard to automate. This could soften takeoff some, though my best guess is that this only delays things by a couple years. Perhaps 2026/27-models speed are the proto-automated-researcher, it takes another year or two for some final unhobbling, a somewhat better model, inference speedups, and working out kinks to get to full automation, and finally by 2028 we get the 10x acceleration (and superintelligence by the end of the decade).
            - listitem [ref=e231]:
              - strong [ref=e232]:
                - emphasis [ref=e233]: Inherent limits to algorithmic progress
              - emphasis [ref=e234]: ":"
              - text: Maybe another 5 OOMs of algorithmic efficiency will be fundamentally impossible? I doubt it. While there will definitely be upper limits,
              - button [ref=e236] [cursor=pointer]:
                - img [ref=e237]
                - img [ref=e239]
                - img [ref=e241]
              - text: if we got 5 OOMs in the last decade, we should probably expect at least another decade’s-worth of progress to be possible. More directly, current architectures and training algorithms are still very rudimentary, and it seems that much more efficient schemes should be possible. Biological reference classes also support dramatically more efficient algorithms being plausible.
            - listitem [ref=e243]:
              - strong [ref=e244]:
                - emphasis [ref=e245]: "Ideas get harder to find, so the automated AI researchers will merely sustain, rather than accelerate, the current rate of progress:"
              - text: "One objection is that although automated research would increase effective research effort a lot, ideas also get harder to find. That is, while it takes only a few hundred top researchers at a lab to sustain 0.5 OOMs/year today, as we exhaust the low-hanging fruit, it will take more and more effort to sustain that progress—and so the 100 million automated researchers will be merely what’s necessary to sustain progress. I think this basic model is correct, but the empirics don’t add up: the magnitude of the increase in research effort—a million-fold—is way, way larger than the historical trends of the growth in research effort that’s been necessary to sustain progress. In econ modeling terms, it’s a bizarre “knife-edge assumption” to assume that the increase in research effort from automation will be"
              - emphasis [ref=e246]: just enough
              - text: to keep progress constant.
            - listitem [ref=e247]:
              - strong [ref=e248]:
                - emphasis [ref=e249]: Ideas get harder to find and there are diminishing returns, so the intelligence explosion will quickly fizzle
              - emphasis [ref=e250]: ":"
              - text: Related to the above objection, even if the automated AI researchers lead to an initial burst of progress, whether rapid progress can be sustained depends on the shape of the diminishing returns curve to algorithmic progress. Again, my best read of the empirical evidence is that the exponents shake out in favor of explosive/accelerating progress. In any case, the sheer size of the one-time boost—from 100s to 100s of millions of AI researchers—probably overcomes diminishing returns here for at least a good number of OOMs of algorithmic progress, even though it of course can’t be
              - emphasis [ref=e251]: indefinitely
              - text: self-sustaining.
